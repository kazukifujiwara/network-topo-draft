  md += '## Devices\n\n' + mdTable(
    ['name','role','site','tenant','vrfs','device_type','platform'],
    d.devices.map(x=>[x.name, x.role, x.site, x.tenant, (x.vrfs||[]).join(', '), x.device_type, x.platform])) + '\n';
  if(d.provider_networks)
    md += '## Provider Networks\n\n' + mdTable(['name','provider','description'],
      d.provider_networks.map(p=>[p.name, p.provider, p.description])) + '\n';
  const ifRows = [];
  d.devices.forEach(x=>(x.interfaces||[]).forEach(f=>ifRows.push([x.name, f.name, f.ip_address, f.vrf, f.lag, f.type, f.description])));
  md += '## Interfaces\n\n' + mdTable(['device','interface','ip_address','vrf','lag','type','description'], ifRows) + '\n';
  md += '## Local Connections (Cables)\n\n' + mdTable(
    ['A','B','type','bandwidth','status','label'],
    (d.cables||[]).map(c=>[epStr(c.a), epStr(c.b), c.type, c.bandwidth, c.status, c.label])) + '\n';
  md += '## Carrier Circuits\n\n' + mdTable(
    ['cid','provider','type','commit_rate','status','A','B'],
    (d.circuits||[]).map(c=>[c.cid, c.provider, c.type, c.commit_rate, c.status, epStr(c.a), epStr(c.b)])) + '\n';
  md += '## Logical Links (L3 / VRF)\n\n' + mdTable(
    ['link_id','vlan','A (device [vrf] if)','B (device [vrf] if)','label','description'],
    (d.logical_links||[]).map(c=>[c.link_id, c.vlan, epStr(c.a), epStr(c.b), c.label, c.description]));
  const ccDevs = d.devices.filter(x=>x.config_context);
  if(ccDevs.length){
    md += '\n## Config Contexts\n\n';
    ccDevs.forEach(x=>{ md += '### ' + x.name + '\n\n```json\n' + JSON.stringify(x.config_context, null, 2) + '\n```\n\n'; });
  }
  return md;
}
function schemaLegend(){
  return `- devices[] : network devices (≈ NetBox Device)
  - name: hostname (unique, used as reference key) / device_type / role: free text / site: location grouping / tenant: owning organization / platform: OS
  - vrfs[]: VRF routing instances configured on the device (names, free text)
  - config_context: free-form structured settings per device (routing, BGP, policies …) as a JSON object; stored as-is, not drawn
  - interfaces[]: name (physical "Gi0/0/1", subinterface "Gi0/0/1.100", or LAG parent "Po1"), ip_address (CIDR), type, description, lag (parent LAG interface on the same device), vrf (VRF the interface belongs to)
  - position: editor canvas coordinates {x,y} — no network meaning; optional
- provider_networks[] : carrier-side networks such as AWS Direct Connect / OCI FastConnect (≈ NetBox Provider Network)
  - name (unique) / provider / description / position
- cables[] : local physical connections (≈ NetBox Cable) — a/b: {device, interface}; type / bandwidth / status / label
- circuits[] : carrier circuits (≈ NetBox Circuit) — cid / provider / type / commit_rate / status; a/b: {site, device, interface} or {provider_network}
- logical_links[] : logical (L3) adjacencies between routing instances — Network TopoDraft extension, not a NetBox object
  - a / b endpoints: {device, vrf, id, interface, ip_address} — vrf omitted = global routing table; id = environment/attachment identifier (tenant ID, VIF/VC ID) for peers whose VRF name is unknown; ip_address allowed directly when no interface is named; {provider_network, id} is also accepted
  - link_id (connection / VC / VIF ID — displayed on the diagram) / vlan (VLAN ID) / label / description
- Empty fields are omitted. Devices sharing the same "site" belong to the same location.`;
}

function genSchema(){
  const endpointDef = {
    description:"Physical link endpoint: {device, interface} or {provider_network}.",
    oneOf:[
      {type:"object", required:["device"], properties:{
        device:{type:"string", description:"device name (must match devices[].name)"},
        interface:{type:"string", description:"interface name on that device"},
        site:{type:"string", description:"informational; the device's site"}}},
      {type:"object", required:["provider_network"], properties:{
        provider_network:{type:"string", description:"provider network name (must match provider_networks[].name)"}}}
    ]
  };
  const logEndpointDef = {
    description:"Logical link endpoint: a routing instance on a device. vrf omitted/empty = global routing table.",
    oneOf:[
      {type:"object", required:["device"], properties:{
        device:{type:"string", description:"device name (must match devices[].name)"},
        vrf:{type:"string", description:"VRF instance on that device; omit for the global routing table"},
        id:{type:"string", description:"environment / attachment identifier when the VRF name is unknown (tenant ID, VIF/VC ID …); drawn next to the endpoint"},
        interface:{type:"string", description:"interface used by this adjacency (typically a subinterface, e.g. Gi0/0/1.100)"},
        ip_address:{type:"string", description:"endpoint IP (CIDR). If 'interface' is set, prefer putting the IP on that interface in devices[]."}}},
      {type:"object", required:["provider_network"], properties:{
        provider_network:{type:"string"},
        id:{type:"string", description:"attachment / VC identifier on the provider network"}}}
    ]
  };
  const schema = {
    $schema:"http://json-schema.org/draft-07/schema#",
    title:"Network TopoDraft topology (import format)",
    type:"object",
    required:["devices"],
    additionalProperties:false,
    definitions:{ endpoint: endpointDef, logical_endpoint: logEndpointDef },
    properties:{
      devices:{type:"array", description:"network devices (≈ NetBox Device)", items:{
        type:"object", required:["name"], additionalProperties:false, properties:{
          name:{type:"string", description:"hostname; UNIQUE — referenced by links"},
          device_type:{type:"string", description:"vendor + model, e.g. 'Cisco C8300'"},
          role:{type:"string", description:"free text, e.g. router / switch / firewall / external_peer"},
          site:{type:"string", description:"location grouping; same value = drawn in the same site frame"},
          tenant:{type:"string", description:"owning organization"},
          platform:{type:"string", description:"OS, e.g. 'IOS-XE 17.12'"},
          vrfs:{type:"array", items:{type:"string"},
            description:"VRF routing instances configured on this device; shown as compartments in the logical view"},
          config_context:{type:"object",
            description:"free-form structured settings for the device (routing, BGP, policies …) — any JSON object; stored and re-exported as-is, never drawn on the canvas"},
          interfaces:{type:"array", items:{type:"object", additionalProperties:false, properties:{
            name:{type:"string", description:"e.g. Gi0/0/1, subinterface Gi0/0/1.100, LAG parent Po1"},
            ip_address:{type:"string", description:"CIDR, e.g. 10.0.0.1/30"},
            type:{type:"string", description:"e.g. 1000base-t, lag, virtual"},
            description:{type:"string"},
            lag:{type:"string", description:"name of the parent LAG interface on the SAME device (e.g. Po1)"},
            vrf:{type:"string", description:"VRF this interface belongs to"}}}},
          position:{type:"object", description:"canvas coords; OPTIONAL — omit to auto-arrange on import",
            properties:{x:{type:"number"}, y:{type:"number"}}}}}},
      provider_networks:{type:"array", description:"carrier-side networks: AWS Direct Connect, OCI FastConnect, IP-VPN cloud … (≈ NetBox Provider Network)", items:{
        type:"object", required:["name"], additionalProperties:false, properties:{
          name:{type:"string", description:"UNIQUE — referenced by circuits/logical_links"},
          provider:{type:"string", description:"e.g. AWS / Oracle / Equinix"},
          description:{type:"string"},
          position:{type:"object", properties:{x:{type:"number"}, y:{type:"number"}}}}}},
      cables:{type:"array", description:"local physical connections (≈ NetBox Cable)", items:{
        type:"object", required:["a","b"], additionalProperties:false, properties:{
          a:{$ref:"#/definitions/endpoint"}, b:{$ref:"#/definitions/endpoint"},
          type:{type:"string", description:"media, e.g. cat6 / smf / dac"},
          bandwidth:{type:"string", description:"e.g. 10Gbps, 2x10G LAG"},
          status:{type:"string", description:"e.g. connected / planned"},
          label:{type:"string"}}}},
      circuits:{type:"array", description:"carrier circuits between sites or to provider networks (≈ NetBox Circuit)", items:{
        type:"object", required:["a","b"], additionalProperties:false, properties:{
          cid:{type:"string", description:"circuit ID"},
          provider:{type:"string", description:"carrier name"},
          type:{type:"string", description:"e.g. leased line / IP-VPN / Direct Connect"},
          commit_rate:{type:"string", description:"contracted bandwidth, e.g. 1Gbps"},
          status:{type:"string"},
          a:{$ref:"#/definitions/endpoint"}, b:{$ref:"#/definitions/endpoint"}}}},
      logical_links:{type:"array", description:"logical (L3) adjacencies between routing instances (VRFs) — Network TopoDraft extension, not a NetBox object. Rendered in the logical view connecting VRF compartments.", items:{
        type:"object", required:["a","b"], additionalProperties:false, properties:{
          link_id:{type:"string", description:"connection ID (VC / VIF / peering ID) — displayed as the link label on the diagram"},
          vlan:{type:"string", description:"VLAN ID used by this adjacency (e.g. the VIF VLAN)"},
          label:{type:"string", description:"e.g. 'OSPF area 0', 'eBGP'"},
          description:{type:"string"},
          a:{$ref:"#/definitions/logical_endpoint"}, b:{$ref:"#/definitions/logical_endpoint"}}}}
    }
  };
  const example = {
    devices:[
      {name:"rt-hq-01", role:"router", site:"HQ", tenant:"NetOps", vrfs:["PROD","DEV"],
       config_context:{bgp:{asn:65010, neighbors:[{peer:"169.254.10.2", remote_asn:64512}]}},

    cables:[{a:{device:"rt-hq-01", interface:"Po1"}, b:{device:"sw-hq-01"}, bandwidth:"2x1G LAG", status:"connected"}],
    circuits:[{cid:"DX-001", provider:"Equinix", type:"Direct Connect", commit_rate:"1Gbps",
               a:{site:"HQ", device:"rt-hq-01"}, b:{provider_network:"AWS Direct Connect"}}],
    logical_links:[
      {label:"eBGP", vlan:"100",
       a:{device:"rt-hq-01", vrf:"PROD", interface:"Gi0/0/3.100"},
       b:{device:"rt-dc-01", vrf:"PROD", interface:"Gi0/0/3.100"}},
      {link_id:"dxvif-abc123",
       a:{device:"rt-hq-01", vrf:"PROD"},
       b:{provider_network:"AWS Direct Connect", id:"dxcon-xyz789"}}]
  };
  return `# Network TopoDraft import schema (for AI agents & external tools)

Generate a JSON (or YAML) document that follows the schema below, and it can be loaded into Network TopoDraft via the Import button. The idea: draft the topology externally (e.g. with an AI agent), then fine-tune it in the editor.

## Rules
- Only the "devices" array is required (it may even be empty). Every other field is optional — omit fields instead of writing "" or null.
- "name" values of devices and provider_networks must be UNIQUE; cables / circuits / logical_links reference them by name.
- "position" is optional. If omitted, the editor auto-arranges nodes by site on import.
- role / site / tenant / vrf / status / type are FREE TEXT (no fixed enum). Field naming follows NetBox conventions.
- Subinterfaces use dotted names (Gi0/0/1.100). LAG membership: set "lag" on member interfaces to the parent interface name (e.g. Po1); give the parent interface type "lag".
- VRF model: devices declare routing instances in "vrfs"; logical_links connect a {device, vrf} pair to another {device, vrf} pair. Omitting "vrf" on an endpoint means the global routing table. Endpoints on the two sides may have different VRFs (e.g. route leaking).
- When a peer's VRF name is unknown (external tenants, provider attachments), put the known identifier in the endpoint "id" (tenant ID, VIF/VC ID). A per-connection identifier belongs in "link_id" and is displayed on the diagram.
- "config_context" on a device may hold any JSON object with device settings (routing, BGP, policies …); the editor stores it and re-exports it unchanged.
- Circuits and logical_links may terminate on a provider network via {"provider_network": "<name>"}.

## JSON Schema (draft-07)
\`\`\`json
${JSON.stringify(schema, null, 2)}
\`\`\`

## Minimal valid example
\`\`\`json
${JSON.stringify(example, null, 2)}
\`\`\``;

function genDrawio(){
  const x = s => String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  let id = 1;
  const cells = [];
  const groups = {};
  devices.forEach(d=>{ const s=siteOf(d); if(s) (groups[s]=groups[s]||[]).push(d); });
  for(const s in groups){
    const ds = groups[s], PAD=26;
    const x0=Math.min(...ds.map(d=>d.x))-PAD, y0=Math.min(...ds.map(d=>d.y))-PAD-12;
    const w=Math.max(...ds.map(d=>d.x+NODE_W))+PAD-x0, h=Math.max(...ds.map(d=>d.y+NODE_H))+PAD-y0;
    cells.push(`<mxCell id="s${++id}" value="${x(s)}" style="rounded=1;dashed=1;fillColor=none;strokeColor=#8899AA;verticalAlign=top;align=left;spacing=8;fontColor=#8899AA;" vertex="1" parent="1"><mxGeometry x="${x0}" y="${y0}" width="${w}" height="${h}" as="geometry"/></mxCell>`);
  }
  const FILL = {router:'#dae8fc', switch:'#d5e8d4', firewall:'#ffe6cc', cloud:'#e1d5e7', server:'#d0f0f0', generic:'#f5f5f5', pnet:'#fff2cc'};
  const idOf = {};
  devices.forEach(d=>{
    const k = nodeIconKey(d);
    idOf[d.id] = 'n'+(++id);
    const vrfs = devVrfs(d);
    const sub = isPn(d) ? (d.provider||'provider net') : [d.role, vrfs.length?('vrf: '+vrfs.join(',')):''].filter(Boolean).join(' · ');
    const label = x(d.name) + (sub?`&#10;${x(sub)}`:'');
    const extra = isPn(d) ? 'dashed=1;' : '';
    cells.push(`<mxCell id="${idOf[d.id]}" value="${label}" style="rounded=1;whiteSpace=wrap;html=1;fillColor=${FILL[k]};strokeColor=#666666;${extra}" vertex="1" parent="1"><mxGeometry x="${d.x}" y="${d.y}" width="${NODE_W}" height="${NODE_H}" as="geometry"/></mxCell>`);
  });
  links.forEach(l=>{
    let st, lbl;
    if(l.kind==='circuit'){
      st = 'endArrow=none;dashed=1;strokeColor=#9673a6;strokeWidth=2;';
      lbl = [l.cid,l.provider].filter(Boolean).join(' ');
    } else if(l.kind==='logical'){
      st = `endArrow=none;dashed=1;dashPattern=1 4;strokeColor=${vrfColor(logicalVrfOf(l))};strokeWidth=2;`;
      lbl = linkLabelText(l);
    } else {
      st = 'endArrow=none;strokeColor=#666666;';
      lbl = [l.label,l.type,l.bandwidth].filter(Boolean).join(' ');
    }
    cells.push(`<mxCell id="e${++id}" value="${x(lbl)}" style="${st}html=1;" edge="1" parent="1" source="${idOf[l.a.dev]}" target="${idOf[l.b.dev]}"><mxGeometry relative="1" as="geometry"/></mxCell>`);
  });
  return `<mxfile host="Network TopoDraft"><diagram name="topology"><mxGraphModel dx="800" dy="600" grid="1" gridSize="10" page="0"><root><mxCell id="0"/><mxCell id="1" parent="0"/>${cells.join('')}</root></mxGraphModel></diagram></mxfile>`;
}

function ccParse(text, fmt){
  const s = (text||'').trim();
  if(!s) return {obj:null};
  try{
    let o;
    if(fmt==='yaml'){
      if(typeof jsyaml==='undefined') return {err:T('t_yaml_na')};
      o = jsyaml.load(s);
    } else {
      o = JSON.parse(s);
    }
    if(o==null || typeof o!=='object' || Array.isArray(o)) return {err:T('t_cc_obj')};
    return {obj:o};
  }catch(e){ return {err:e.message}; }
}
function ccSerialize(obj, fmt){
  if(!obj || !Object.keys(obj).length) return '';
  if(fmt==='yaml'){
    if(typeof jsyaml==='undefined') return '';
    return jsyaml.dump(obj, {lineWidth:120, noRefs:true});
  }
  return JSON.stringify(obj, null, 2);
}

$('#modalCopy').onclick = async ()=>{
  try{ await navigator.clipboard.writeText(modalText.value); toast(T('t_clip')); }
  catch{ modalText.select(); document.execCommand('copy'); toast(T('t_clip2')); }
};
$('#modalMain').onclick = ()=>{
  if(modalMode==='export'){
    const t = TABS.find(x=>x.id===curTab);
    const blob = new Blob([modalText.value], {type:'text/plain;charset=utf-8'});
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob); a.download = t.file; a.click();
    URL.revokeObjectURL(a.href);
  } else if(modalMode==='import'){
    doImport(modalText.value);
  } else if(modalMode==='config'){
    const d = devById(ccDevId);
    if(!d) { closeModal(); return; }
    const p = ccParse(modalText.value, ccFmt);
    if(p.err){ toast(T('t_cc_err') + p.err); return; }
    d.config_context = p.obj;
    pushHistory(); renderPanel(); closeModal();
    toast(T('t_cc_saved'));
  }
};
$('#modalFile').onclick = ()=> $('#fileInput').click();
$('#fileInput').addEventListener('change', e=>{
  const f = e.target.files[0];
  if(!f) return;
  const rd = new FileReader();
  rd.onload = ()=>{ modalText.value = rd.result; };
  rd.readAsText(f);
  e.target.value = '';
});
function doImport(text){
  let obj = null;
  try{ obj = JSON.parse(text); }
  catch{
    try{ if(typeof jsyaml!=='undefined') obj = jsyaml.load(text); }catch(e2){}
  }
  if(!obj){ toast(T('t_parse')); return; }
  try{
    importData(obj);
    closeModal();
    toast(T('t_imported').replace('{d}', devices.length).replace('{l}', links.length));
  }catch(err){
    toast(T('t_import_fail') + err.message);
  }
}
$('#btnExport').onclick = ()=> openExport('json');
$('#btnImport').onclick = openImport;

const TPL_KEY = 'topodraft.templates.v1';
let memTpls = [];
function userTpls(){
  try{
    const v = localStorage.getItem(TPL_KEY);
    return v ? JSON.parse(v) : memTpls;
  }catch(e){ return memTpls; }
}
function saveUserTpls(list){
  memTpls = list;
  try{ localStorage.setItem(TPL_KEY, JSON.stringify(list)); }catch(e){}
}
function loadTplData(data, name){
  importData(JSON.parse(JSON.stringify(data)));
  toast(T('t_tpl_loaded') + name);
}
function renderTpls(){
  const wrap = $('#tplList');
  wrap.innerHTML = '';
  const mk = (t, custom) => {
    const d = document.createElement('div');
    d.className = 'tpl-item';
    d.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="${custom?'var(--acc)':'var(--tx3)'}" stroke-width="1.8"><rect x="4" y="4" width="16" height="16" rx="2"/><path d="M4 10h16M10 10v10"/></svg><span class="tn">${esc(t.name)}</span>` + (custom?'<button class="tpl-x" title="Delete template">×</button>':'');
    d.onclick = e=>{
      if(e.target.classList.contains('tpl-x')){
        saveUserTpls(userTpls().filter(x=>x.name!==t.name || x.ts!==t.ts));
        renderTpls();
        toast(T('t_tpl_deleted'));
        return;
      }
      loadTplData(t.data, t.name);
    };
    wrap.appendChild(d);
  };
  BUILTIN_TPLS.forEach(t=>mk(t,false));
  const us = userTpls();
  us.slice(0,3).forEach(t=>mk(t,true));
  if(us.length>3){
    const more = document.createElement('div');
    more.style.cssText = 'font-size:10px;color:var(--tx3);font-family:var(--mono);padding:2px 4px';
    more.textContent = T('tpl_more').replace('{n}', us.length-3);
    wrap.appendChild(more);
  }
}
$('#tplSave').onclick = saveCurrentTpl;
$('#tplName').addEventListener('keydown', e=>{ if(e.key==='Enter') saveCurrentTpl(); e.stopPropagation(); });
function saveCurrentTpl(){
  const name = $('#tplName').value.trim();
  if(!name){ toast(T('t_tpl_name')); $('#tplName').focus(); return; }
  if(!devices.length){ toast(T('t_tpl_empty')); return; }
  const list = userTpls().filter(t=>t.name!==name);
  list.unshift({name, ts:Date.now(), data:exportData()});
  saveUserTpls(list.slice(0,12));
  $('#tplName').value = '';
  renderTpls();
  toast(T('t_tpl_saved') + name);
}
