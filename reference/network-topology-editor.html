<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Network TopoDraft — Topology Editor</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/js-yaml/4.1.0/js-yaml.min.js"></script>
<style>
:root{
  --bg0:#0F1317; --bg1:#161B21; --bg2:#1D242C; --bg3:#242D37;
  --line:#2A333E; --line2:#3A4552;
  --tx:#DEE5EE; --tx2:#94A1B4; --tx3:#5E6B7D;
  --acc:#6AA9FF; --acc-dim:#31517E;
  --danger:#E5636C; --ok:#4CC38A;
  --c-router:#5B9DFF; --c-switch:#4CC38A; --c-firewall:#F2994A;
  --c-cloud:#B18CFF; --c-server:#45C4CE; --c-generic:#93A0B4; --c-pnet:#D9A44C;
  --mono:ui-monospace,"SF Mono","Cascadia Code",Consolas,"Roboto Mono",monospace;
  --sans:-apple-system,BlinkMacSystemFont,"Segoe UI","Hiragino Sans","Noto Sans JP",sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{background:var(--bg0);color:var(--tx);font-family:var(--sans);font-size:13px}
button{font-family:inherit;cursor:pointer}
input,select,textarea{font-family:inherit}

/* ---------- Layout ---------- */
#app{display:flex;flex-direction:column;height:100%}
#topbar{display:flex;align-items:center;gap:7px;height:46px;padding:0 12px;background:var(--bg1);border-bottom:1px solid var(--line);flex:0 0 auto}
#main{display:flex;flex:1;min-height:0}
#palette{width:186px;flex:0 0 auto;background:var(--bg1);border-right:1px solid var(--line);padding:10px;overflow-y:auto;display:flex;flex-direction:column}
#canvasWrap{position:relative;flex:1;min-width:0;background:var(--bg0)}
#panel{width:300px;flex:0 0 auto;background:var(--bg1);border-left:1px solid var(--line);overflow-y:auto;padding:12px}
#statusbar{display:flex;align-items:center;gap:14px;height:26px;padding:0 12px;background:var(--bg1);border-top:1px solid var(--line);color:var(--tx3);font-family:var(--mono);font-size:11px;flex:0 0 auto}
#statusbar .grow{flex:1}

/* ---------- Topbar ---------- */
.logo{display:flex;align-items:center;gap:8px;margin-right:8px}
.logo svg{width:20px;height:20px}
.logo b{font-size:14px;letter-spacing:.04em}
.tb-sep{width:1px;height:22px;background:var(--line);margin:0 3px}
.tb-btn{display:inline-flex;align-items:center;gap:6px;height:28px;padding:0 9px;background:transparent;border:1px solid transparent;border-radius:6px;color:var(--tx2);font-size:12px}
.tb-btn:hover{background:var(--bg2);color:var(--tx)}
.tb-btn:disabled{opacity:.35;cursor:default}
.tb-btn:disabled:hover{background:transparent;color:var(--tx2)}
.tb-btn.active{background:var(--acc-dim);color:var(--tx);border-color:var(--acc-dim)}
.tb-btn.primary{background:var(--acc);color:#0C1522;font-weight:600}
.tb-btn.primary:hover{filter:brightness(1.1)}
.tb-btn svg{width:14px;height:14px}
.tb-seg{display:flex;background:var(--bg2);border:1px solid var(--line);border-radius:7px;padding:2px}
.tb-seg button{height:24px;padding:0 11px;border:0;background:transparent;color:var(--tx3);border-radius:5px;font-size:12px}
.tb-seg button.on{background:var(--bg3);color:var(--tx)}
.spacer{flex:1}

/* ---------- Palette ---------- */
.pal-title{font-size:10px;letter-spacing:.14em;color:var(--tx3);font-family:var(--mono);text-transform:uppercase;margin:6px 0 8px}
.pal-item{display:flex;align-items:center;gap:9px;padding:7px 9px;margin-bottom:6px;background:var(--bg2);border:1px solid var(--line);border-radius:8px;cursor:grab;user-select:none;transition:border-color .1s}
.pal-item:hover{border-color:var(--line2);background:var(--bg3)}
.pal-item:active{cursor:grabbing}
.pal-item svg{width:20px;height:20px;flex:0 0 auto}
.pal-item .pl{font-size:12px;color:var(--tx)}
.pal-item .ps{font-size:10px;color:var(--tx3);font-family:var(--mono)}
.pal-hint{margin-top:8px;font-size:11px;color:var(--tx3);line-height:1.7}
.pal-hint kbd,#modalHelp kbd,.pn-info kbd{font-family:var(--mono);font-size:10px;background:var(--bg3);border:1px solid var(--line2);border-radius:4px;padding:1px 4px;color:var(--tx2)}
.tpl-item{display:flex;align-items:center;gap:7px;padding:6px 8px;margin-bottom:5px;background:var(--bg2);border:1px solid var(--line);border-radius:7px;cursor:pointer;font-size:11.5px;color:var(--tx2)}
.tpl-item:hover{border-color:var(--line2);color:var(--tx)}
.tpl-item svg{width:14px;height:14px;flex:0 0 auto}
.tpl-item .tn{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.tpl-x{background:transparent;border:0;color:var(--tx3);font-size:13px;padding:0 2px;border-radius:4px}
.tpl-x:hover{color:var(--danger)}
#tplSaveRow{display:flex;gap:5px;margin-top:4px}
#tplName{flex:1;min-width:0;height:26px;background:var(--bg0);border:1px solid var(--line);border-radius:6px;color:var(--tx);padding:0 7px;font-size:11px;font-family:var(--mono)}
#tplName:focus{outline:none;border-color:var(--acc-dim)}
#tplSave{height:26px;padding:0 9px;background:var(--bg2);border:1px solid var(--line2);border-radius:6px;color:var(--tx2);font-size:11px}
#tplSave:hover{color:var(--tx);background:var(--bg3)}
.mini-btn{width:100%;height:27px;background:var(--bg2);border:1px dashed var(--line2);border-radius:6px;color:var(--tx2);font-size:11px;margin-top:2px}
.mini-btn:hover{background:var(--bg3);color:var(--tx)}
.mini-btn.danger:hover{color:var(--danger);border-color:var(--danger)}

/* ---------- Canvas ---------- */
#svg{width:100%;height:100%;display:block;cursor:default}
#svg.panning{cursor:grabbing}
#svg.linking{cursor:crosshair}
.site-rect{fill:rgba(106,169,255,.025);stroke:var(--line2);stroke-width:1.2;stroke-dasharray:7 5}
.site-label{fill:var(--tx3);font-family:var(--mono);font-size:11px;letter-spacing:.08em;cursor:text}
.site-label:hover{fill:var(--tx2)}
.node-box{fill:var(--bg2);stroke:var(--line2);stroke-width:1.2}
.node-box.pnbox{stroke-dasharray:6 4;stroke:#5A5344}
.node.selected .node-box{stroke:var(--acc);stroke-width:1.6;stroke-dasharray:none}
.node:hover .node-box{stroke:var(--tx3)}
.node.selected:hover .node-box{stroke:var(--acc)}
.node{cursor:move}
.node-name{fill:var(--tx);font-size:12px;font-weight:600;font-family:var(--mono)}
.node-sub{fill:var(--tx3);font-size:10px;font-family:var(--mono)}
.vrf-row{fill:var(--bg0);stroke-width:1}
.vrf-row-label{font-size:10px;font-family:var(--mono);pointer-events:none}
.vrf-row.drop{stroke:var(--acc) !important;stroke-width:2;fill:rgba(106,169,255,.09)}
.ep-id{fill:var(--tx3);font-size:9px;font-family:var(--mono);pointer-events:none}
.link-hit{stroke:transparent;stroke-width:14;fill:none;cursor:pointer}
.link-line{stroke:var(--tx3);stroke-width:1.6;fill:none;pointer-events:none}
.link-line.circuit{stroke:var(--c-cloud);stroke-dasharray:8 5;stroke-width:1.8}
.link-line.logical{stroke-width:2.2;stroke-dasharray:1.5 6;stroke-linecap:round}
.link.selected .link-line{stroke:var(--acc) !important;stroke-width:2.4}
.link-label{fill:var(--tx3);font-size:10px;font-family:var(--mono);pointer-events:none}
.link.selected .link-label{fill:var(--acc) !important}
.link.dim{opacity:.15}
.link.dim .link-hit{pointer-events:none}
.port{fill:var(--bg1);stroke:var(--acc);stroke-width:1.4;cursor:crosshair}
.guide{stroke:var(--acc);stroke-width:1;stroke-dasharray:4 4;pointer-events:none}
.templink{stroke:var(--acc);stroke-width:1.6;stroke-dasharray:5 4;fill:none;pointer-events:none}
.marquee{fill:rgba(106,169,255,.07);stroke:var(--acc);stroke-width:1;stroke-dasharray:5 4;pointer-events:none}
#emptyHint{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;color:var(--tx3);pointer-events:none;line-height:2}
#emptyHint b{color:var(--tx2)}
#zoomCtl{position:absolute;left:12px;bottom:12px;display:flex;gap:4px;background:var(--bg1);border:1px solid var(--line);border-radius:8px;padding:4px}
#zoomCtl button{width:26px;height:26px;background:transparent;border:0;border-radius:5px;color:var(--tx2);font-size:14px}
#zoomCtl button:hover{background:var(--bg3);color:var(--tx)}
#vrfLegend{position:absolute;left:12px;bottom:52px;display:none;flex-direction:column;gap:5px;background:var(--bg1);border:1px solid var(--line);border-radius:8px;padding:8px 11px;font-family:var(--mono);font-size:10px;color:var(--tx2);max-height:40vh;overflow-y:auto}
#vrfLegend .vt{color:var(--tx3);letter-spacing:.1em;margin-bottom:2px}
.vrf-chip{display:flex;align-items:center;gap:7px}
.vrf-dot{width:14px;height:3px;border-radius:2px;flex:0 0 auto}
#viewBadge{position:absolute;right:12px;top:12px;font-family:var(--mono);font-size:10px;letter-spacing:.12em;color:var(--tx3);background:var(--bg1);border:1px solid var(--line);border-radius:6px;padding:4px 9px;pointer-events:none;display:none}

/* ---------- Panel ---------- */
.pn-title{font-size:10px;letter-spacing:.14em;color:var(--tx3);font-family:var(--mono);text-transform:uppercase;margin-bottom:10px;display:flex;align-items:center;gap:8px}
.pn-title .badge{background:var(--bg3);border:1px solid var(--line2);border-radius:4px;padding:1px 6px;color:var(--tx2);text-transform:none;letter-spacing:0}
.fld{margin-bottom:9px}
.fld label{display:block;font-size:10px;color:var(--tx3);font-family:var(--mono);margin-bottom:3px;letter-spacing:.05em}
.fld input{width:100%;height:28px;background:var(--bg0);border:1px solid var(--line);border-radius:6px;color:var(--tx);padding:0 8px;font-size:12px;font-family:var(--mono)}
.fld input:focus{outline:none;border-color:var(--acc-dim)}
.fld input:disabled{opacity:.45}
.fld input::placeholder{color:var(--tx3);opacity:.7}
.fld-row{display:flex;gap:8px}
.fld-row .fld{flex:1;min-width:0}
.if-card{background:var(--bg0);border:1px solid var(--line);border-radius:7px;padding:6px;margin-bottom:6px}
.if-row{display:grid;grid-template-columns:1fr 1fr 20px;gap:4px;margin-bottom:4px}
.if-row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:4px;margin-bottom:4px}
.if-row1{display:grid;grid-template-columns:1fr;gap:4px}
.if-card input{height:25px;background:var(--bg1);border:1px solid var(--line);border-radius:5px;color:var(--tx);padding:0 6px;font-size:11px;font-family:var(--mono);width:100%}
.if-card input:focus{outline:none;border-color:var(--acc-dim)}
.if-card input::placeholder{color:var(--tx3);opacity:.65}
.if-del{background:transparent;border:0;color:var(--tx3);font-size:14px;border-radius:5px}
.if-del:hover{color:var(--danger);background:var(--bg3)}
.vchips{display:flex;flex-wrap:wrap;margin-bottom:4px}
.vchip{display:inline-flex;align-items:center;gap:6px;background:var(--bg0);border:1px solid var(--line);border-radius:6px;padding:3px 8px;margin:0 6px 6px 0;font-family:var(--mono);font-size:11px;color:var(--tx)}
.vchip .vd{width:8px;height:8px;border-radius:50%;flex:0 0 auto}
.vchip button{background:none;border:0;color:var(--tx3);font-size:12px;padding:0;line-height:1}
.vchip button:hover{color:var(--danger)}
.vchip.derived{opacity:.7}
#vrfAddRow{display:flex;gap:5px}
#vrfAddRow input{flex:1;min-width:0;height:26px;background:var(--bg0);border:1px solid var(--line);border-radius:6px;color:var(--tx);padding:0 7px;font-size:11px;font-family:var(--mono)}
#vrfAddRow input:focus{outline:none;border-color:var(--acc-dim)}
#vrfAddRow button{height:26px;padding:0 10px;background:var(--bg2);border:1px solid var(--line2);border-radius:6px;color:var(--tx2);font-size:11px}
#vrfAddRow button:hover{color:var(--tx);background:var(--bg3)}
.cc-preview{background:var(--bg0);border:1px solid var(--line);border-radius:7px;padding:7px 8px;font-family:var(--mono);font-size:10px;color:var(--tx2);white-space:pre-wrap;word-break:break-all;max-height:120px;overflow:hidden;margin-bottom:6px;cursor:pointer;line-height:1.5}
.cc-preview:hover{border-color:var(--line2)}
.pn-actions{display:flex;gap:6px;margin-top:14px}
.pn-actions button{flex:1;height:29px;border-radius:6px;font-size:12px;border:1px solid var(--line2);background:var(--bg2);color:var(--tx2)}
.pn-actions button:hover{color:var(--tx);background:var(--bg3)}
.pn-actions button.danger:hover{color:var(--danger);border-color:var(--danger)}
.align-row{display:flex;gap:6px;margin-bottom:6px}
.align-row button{flex:1;height:30px;border-radius:6px;font-size:11px;border:1px solid var(--line);background:var(--bg0);color:var(--tx2);font-family:var(--mono)}
.align-row button:hover{color:var(--tx);border-color:var(--line2);background:var(--bg2)}
.pn-info{color:var(--tx2);font-size:12px;line-height:1.8}
.pn-info h4{font-size:11px;color:var(--tx3);font-family:var(--mono);letter-spacing:.1em;margin:14px 0 5px}
.pn-sep{height:1px;background:var(--line);margin:12px 0}
.seg{display:flex;background:var(--bg0);border:1px solid var(--line);border-radius:6px;padding:2px;margin-bottom:10px}
.seg button{flex:1;height:24px;border:0;background:transparent;color:var(--tx3);border-radius:4px;font-size:11px}
.seg button.on{background:var(--bg3);color:var(--tx)}
.seg button:disabled{opacity:.3;cursor:default}
.ep-box{background:var(--bg0);border:1px solid var(--line);border-radius:7px;padding:8px;margin-bottom:8px}
.ep-box .ep-dev{font-family:var(--mono);font-size:11px;color:var(--tx);margin-bottom:5px}
.ep-box .ep-site{color:var(--tx3);font-size:10px;font-family:var(--mono)}
.ep-box .ep-lbl{font-size:9px;color:var(--tx3);font-family:var(--mono);margin:5px 0 2px;letter-spacing:.06em}
.ep-box input{width:100%;height:26px;background:var(--bg1);border:1px solid var(--line);border-radius:5px;color:var(--tx);padding:0 7px;font-size:11px;font-family:var(--mono)}
.ep-box input:focus{outline:none;border-color:var(--acc-dim)}
.ep-box input:disabled{opacity:.45}
.ep-box .ep-grid{display:grid;grid-template-columns:1fr 1fr;gap:4px}

/* ---------- Overlays ---------- */
#ctxMenu{position:fixed;z-index:60;background:var(--bg2);border:1px solid var(--line2);border-radius:9px;padding:5px;min-width:186px;box-shadow:0 10px 30px rgba(0,0,0,.5);display:none}
#ctxMenu .ci{display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:6px;font-size:12px;color:var(--tx);cursor:pointer;white-space:nowrap}
#ctxMenu .ci:hover{background:var(--bg3)}
#ctxMenu .ci.danger{color:var(--danger)}
#ctxMenu .ci kbd{margin-left:auto;font-family:var(--mono);font-size:10px;color:var(--tx3)}
#ctxMenu .csep{height:1px;background:var(--line);margin:5px 4px}
#ctxMenu .clabel{font-size:10px;color:var(--tx3);font-family:var(--mono);padding:5px 10px 2px}
#ctxMenu .roles{display:flex;gap:4px;padding:2px 8px 6px}
#ctxMenu .roles button{width:30px;height:28px;background:var(--bg0);border:1px solid var(--line);border-radius:6px;display:flex;align-items:center;justify-content:center}
#ctxMenu .roles button:hover{border-color:var(--acc)}
#ctxMenu .roles svg{width:16px;height:16px}

#cmdOverlay{position:fixed;inset:0;z-index:70;background:rgba(8,11,14,.55);display:none;align-items:flex-start;justify-content:center;padding-top:12vh}
#cmdBox{width:520px;max-width:92vw;background:var(--bg1);border:1px solid var(--line2);border-radius:12px;box-shadow:0 20px 60px rgba(0,0,0,.6);overflow:hidden}
#cmdInput{width:100%;height:46px;background:transparent;border:0;border-bottom:1px solid var(--line);color:var(--tx);padding:0 16px;font-size:14px;font-family:var(--mono)}
#cmdInput:focus{outline:none}
#cmdList{max-height:320px;overflow-y:auto;padding:6px}
.cmd-item{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:7px;cursor:pointer;font-size:13px}
.cmd-item .ck{margin-left:auto;font-family:var(--mono);font-size:10px;color:var(--tx3)}
.cmd-item.sel{background:var(--bg3)}
.cmd-item .cat{font-family:var(--mono);font-size:10px;color:var(--tx3);width:64px;flex:0 0 auto}

#modal{position:fixed;inset:0;z-index:80;background:rgba(8,11,14,.6);display:none;align-items:center;justify-content:center}
#modalBox{width:740px;max-width:94vw;height:80vh;background:var(--bg1);border:1px solid var(--line2);border-radius:12px;display:flex;flex-direction:column;box-shadow:0 20px 60px rgba(0,0,0,.6)}
#modalHead{display:flex;align-items:center;gap:6px;padding:12px 14px;border-bottom:1px solid var(--line);flex-wrap:wrap}
#modalHead b{font-size:13px;margin-right:8px}
.mtab{height:27px;padding:0 11px;background:transparent;border:1px solid transparent;border-radius:6px;color:var(--tx3);font-size:12px}
.mtab:hover{color:var(--tx)}
.mtab.on{background:var(--bg3);color:var(--tx);border-color:var(--line2)}
#modalClose{margin-left:auto;background:transparent;border:0;color:var(--tx3);font-size:18px;width:28px;height:28px;border-radius:6px}
#modalClose:hover{background:var(--bg3);color:var(--tx)}
#modalBody{flex:1;min-height:0;display:flex;flex-direction:column;padding:12px 14px;gap:10px}
#modalText{flex:1;background:var(--bg0);border:1px solid var(--line);border-radius:8px;color:var(--tx);font-family:var(--mono);font-size:11.5px;padding:10px;resize:none;line-height:1.55;white-space:pre}
#modalText:focus{outline:none;border-color:var(--acc-dim)}
#modalHelp{flex:1;min-height:0;overflow-y:auto;background:var(--bg0);border:1px solid var(--line);border-radius:8px;padding:14px 18px;font-size:12.5px;line-height:2;color:var(--tx2);display:none}
#modalHelp h4{font-size:11px;color:var(--tx3);font-family:var(--mono);letter-spacing:.12em;margin:12px 0 4px;text-transform:uppercase}
#modalHelp h4:first-child{margin-top:0}
#modalHelp b{color:var(--tx)}
#modalFoot{display:flex;gap:8px;align-items:center}
#modalFoot .note{color:var(--tx3);font-size:11px;flex:1}
.m-btn{height:30px;padding:0 14px;border-radius:7px;font-size:12px;border:1px solid var(--line2);background:var(--bg2);color:var(--tx)}
.m-btn:hover{background:var(--bg3)}
.m-btn.primary{background:var(--acc);border-color:var(--acc);color:#0C1522;font-weight:600}
.m-btn.primary:hover{filter:brightness(1.1)}

#toast{position:fixed;bottom:44px;left:50%;transform:translateX(-50%) translateY(8px);z-index:90;background:var(--bg3);border:1px solid var(--line2);color:var(--tx);padding:8px 16px;border-radius:8px;font-size:12px;opacity:0;transition:all .18s;pointer-events:none}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

#inlineEdit{position:absolute;z-index:50;display:none;background:var(--bg0);border:1.5px solid var(--acc);border-radius:6px;color:var(--tx);font-family:var(--mono);font-size:12px;font-weight:600;padding:2px 6px;text-align:center}
#inlineEdit:focus{outline:none}
::-webkit-scrollbar{width:9px;height:9px}
::-webkit-scrollbar-thumb{background:var(--line2);border-radius:5px}
::-webkit-scrollbar-track{background:transparent}
</style>
</head>
<body>
<div id="app">
  <div id="topbar">
    <div class="logo">
      <svg viewBox="0 0 24 24" fill="none" stroke="#6AA9FF" stroke-width="1.8"><circle cx="5" cy="6" r="2.4"/><circle cx="19" cy="6" r="2.4"/><circle cx="12" cy="18" r="2.4"/><path d="M6.8 7.6 10.5 16M17.2 7.6 13.5 16M7.4 6h9.2"/></svg>
      <b>Network TopoDraft</b>
    </div>
    <div class="tb-sep"></div>
    <button class="tb-btn" id="btnUndo" title="Undo (Ctrl+Z)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 14 4 9l5-5"/><path d="M4 9h10a6 6 0 0 1 0 12h-3"/></svg>Undo</button>
    <button class="tb-btn" id="btnRedo" title="Redo (Ctrl+Shift+Z)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m15 14 5-5-5-5"/><path d="M20 9H10a6 6 0 0 0 0 12h3"/></svg>Redo</button>
    <div class="tb-sep"></div>
    <button class="tb-btn active" id="btnSnap" title="Grid snap — while ON, dragged nodes snap to a 10px grid"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 3v18M3 12h18"/><path d="M8.5 8.5h7v7h-7z"/></svg>Snap</button>

<script>
/* =====================================================
   Network TopoDraft v4 — network topology editor
   nodes: devices[] (kind 'device' | 'pn'); devices carry vrfs[] (routing instances)
   links[]: kind 'cable' | 'circuit' | 'logical'
   logical link endpoints: {dev, vrf, ifname} — vrf '' = global routing table
   logical view: devices render VRF compartments; links connect compartments
   ===================================================== */
'use strict';

/* ---------- state ---------- */
let devices = [];
let links   = [];
let seq = 0;
const uid = p => p + (++seq) + '_' + Math.random().toString(36).slice(2,6);

const NODE_W = 152, NODE_H = 52, GRID = 10;
const HEAD_H = 44, VRF_ROW = 24;      /* logical-view compartments */
let vt = {x: 60, y: 40, k: 1};
let snapOn = true, gridOn = true;
let viewMode = 'physical';
let underlayOn = true;
let showGlobal = true;          /* show 'global' compartments in logical view */
let selDevs = new Set(), selLink = null;
let hist = [], hi = -1;
let clipboard = null, pasteN = 0;

/* ---------- dom refs ---------- */
const $ = s => document.querySelector(s);
const svg = $('#svg'), world = $('#world');
const lySites = $('#lySites'), lyLinks = $('#lyLinks'), lyNodes = $('#lyNodes'),
      lyGuides = $('#lyGuides'), lyTemp = $('#lyTemp'), lyGrid = $('#lyGrid'), lyLogi = $('#lyLogi');
const canvasWrap = $('#canvasWrap'), panel = $('#panel');
const SVGNS = 'http://www.w3.org/2000/svg';

/* ---------- icons & roles ---------- */
const ICONS = {
  router:  '<circle cx="12" cy="12" r="9"/><path d="M8 9.5h5m0 0-1.8-1.8M13 9.5l-1.8 1.8M16 14.5h-5m0 0 1.8-1.8M11 14.5l1.8 1.8"/>',
  switch:  '<rect x="3" y="7" width="18" height="10" rx="2"/><path d="M7 10.2h4m0 0-1.5-1.4M11 10.2l-1.5 1.4M17 13.8h-4m0 0 1.5-1.4M13 13.8l1.5 1.4"/>',
  firewall:'<rect x="4" y="5" width="16" height="14" rx="1.5"/><path d="M4 9.7h16M4 14.3h16M9.3 5v4.7M14.7 9.7v4.6M9.3 14.3V19"/>',
  cloud:   '<path d="M7 18a4 4 0 0 1-.6-7.96A5.5 5.5 0 0 1 17.1 8.7 4.2 4.2 0 0 1 16.8 18H7Z"/>',
  server:  '<rect x="4" y="4" width="16" height="7" rx="1.5"/><rect x="4" y="13" width="16" height="7" rx="1.5"/><path d="M8 7.5h.01M8 16.5h.01M12 7.5h4M12 16.5h4"/>',
  generic: '<path d="M12 3 4 7.5v9L12 21l8-4.5v-9L12 3Z"/><path d="M4 7.5 12 12l8-4.5M12 12v9"/>',
  pnet:    '<path d="M6.5 15.5a3.5 3.5 0 0 1-.5-6.96A4.8 4.8 0 0 1 15.3 7.4 3.6 3.6 0 0 1 15 14.5"/><path d="M4 19h16M7.5 15.5V19M12 14.5V19M16.5 14.5V19"/>'
};
const ROLE_COLOR = {router:'var(--c-router)', switch:'var(--c-switch)', firewall:'var(--c-firewall)',
                    cloud:'var(--c-cloud)', server:'var(--c-server)', generic:'var(--c-generic)', pnet:'var(--c-pnet)'};
function iconKey(role){
  const r = (role||'').toLowerCase();
  if(/fw|firewall|utm|waf/.test(r)) return 'firewall';
  if(/sw|switch|l2|l3|fabric/.test(r)) return 'switch';
  if(/rt|router|gw|gateway|edge|core/.test(r)) return 'router';
  if(/cloud|external|internet|peer|isp|wan|saas|aws|oci|azure|gcp/.test(r)) return 'cloud';
  if(/server|srv|host|vm|lb|balancer/.test(r)) return 'server';
  return 'generic';
}
function nodeIconKey(d){ return d.kind==='pn' ? 'pnet' : iconKey(d.role); }
function iconSvg(key, size){
  return `<svg viewBox="0 0 24 24" width="${size}" height="${size}" fill="none" stroke="${ROLE_COLOR[key]}" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">${ICONS[key]}</svg>`;
}
const PAL_TYPES = [
  {k:'router',   role:'router',        sub:'router'},
  {k:'switch',   role:'switch',        sub:'switch'},
  {k:'firewall', role:'firewall',      sub:'firewall'},
  {k:'extpeer',  role:'external_peer', sub:'external_peer'},
  {k:'server',   role:'server',        sub:'server'},
  {k:'pn',       role:'__pn__',        sub:'provider_network', pn:true},
  {k:'generic',  role:'',              sub:'(no role)'}
];
const VRF_PAL = ['#6AA9FF','#4CC38A','#F2994A','#B18CFF','#45C4CE','#E5636C','#D9C24C','#7BD88F'];
function vrfColor(v){
  if(!v) return '#8FA0B8';
  let h = 0;
  for(const c of v) h = (h*31 + c.charCodeAt(0)) >>> 0;
  return VRF_PAL[h % VRF_PAL.length];
}

/* ---------- helpers ---------- */
const devById = id => devices.find(d=>d.id===id);
const isPn = d => d && d.kind==='pn';
const esc = s => String(s??'').replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
function toWorld(sx, sy){
  const r = svg.getBoundingClientRect();
  return {x:(sx-r.left-vt.x)/vt.k, y:(sy-r.top-vt.y)/vt.k};
}
function toScreen(wx, wy){ return {x: wx*vt.k+vt.x, y: wy*vt.k+vt.y}; }
function snap(v){ return snapOn ? Math.round(v/GRID)*GRID : v; }
function el(tag, attrs, html){
  const e = document.createElementNS(SVGNS, tag);
  for(const k in attrs) e.setAttribute(k, attrs[k]);
  if(html!=null) e.innerHTML = html;
  return e;
}
function uniqueName(base){
  let n = base, i = 2;
  while(devices.some(d=>d.name===n)) n = base + '-' + (i++);
  return n;
}
function newDevice(role, x, y){
  if(role==='__pn__'){
    return {id:uid('d'), kind:'pn', name:uniqueName('pnet-01'), provider:'', description:'',
            device_type:'', role:'', site:'', platform:'', tenant:'', vrfs:[], interfaces:[],
            config_context:null, x:snap(x), y:snap(y)};
  }
  const key = iconKey(role);
  const base = {router:'rt-01', switch:'sw-01', firewall:'fw-01', cloud:'ext-01', server:'srv-01', generic:'node-01'}[key];
  return {id:uid('d'), kind:'device', name:uniqueName(base), device_type:'', role:role||'', site:'', platform:'',
          tenant:'', vrfs:[], interfaces:[], config_context:null, x:snap(x), y:snap(y)};
}
function siteOf(dev){ return isPn(dev) ? '' : (dev.site||'').trim(); }
function sitesList(){ return [...new Set(devices.map(siteOf).filter(Boolean))]; }
/* VRF instances of a device = explicit vrfs[] ∪ interface vrfs ∪ logical-endpoint vrfs */
function devVrfs(d){
  if(isPn(d)) return [];
  const s = new Set((d.vrfs||[]).map(v=>v.trim()).filter(Boolean));
  (d.interfaces||[]).forEach(f=>{ const v=(f.vrf||'').trim(); if(v) s.add(v); });
  links.forEach(l=>{
    if(l.kind!=='logical') return;
    if(l.a.dev===d.id && (l.a.vrf||'').trim()) s.add(l.a.vrf.trim());
    if(l.b.dev===d.id && (l.b.vrf||'').trim()) s.add(l.b.vrf.trim());
  });
  return [...s];
}
function allVrfs(){
  const s = new Set();
  devices.forEach(d=>devVrfs(d).forEach(v=>s.add(v)));
  return [...s];
}
function vrfRows(d){ return showGlobal ? ['', ...devVrfs(d)] : devVrfs(d); }
function nodeH(d){
  if(viewMode!=='logical' || isPn(d)) return NODE_H;
  return HEAD_H + vrfRows(d).length*VRF_ROW + 6;
}
function ensureIf(dev, name){
  let f = dev.interfaces.find(x=>x.name===name);
  if(!f){ f = {name, ip_address:'', type:'', description:'', lag:'', vrf:''}; dev.interfaces.push(f); }
  return f;
}
function toast(msg){
  const t = $('#toast'); t.textContent = msg; t.classList.add('show');
  clearTimeout(t._tm); t._tm = setTimeout(()=>t.classList.remove('show'), 1900);
}

    <b>Logical</b> shows each device's routing instances: a <b>global</b> compartment plus one per <b>VRF</b> (add VRFs in the device panel; VRFs referenced by interfaces or links appear automatically). Drag from a <b>compartment's ◦ port</b> (hover a compartment to also get top/bottom ports) and drop <b>anywhere on the target compartment</b> — it highlights. The two ends may be different VRFs (route leaking). Logical links are straight lines drawn <b>on top of</b> the nodes, anchored on whichever of the compartment's 4 sides faces the target, with a colored dot at each end; the line label is the <b>link_id</b>. <b>Global</b> hides the global compartments; <b>Underlay</b> toggles the faint physical links.
    <h4>Logical link panel</h4>
    Each endpoint edits its <b>VRF</b>, an optional <b>ID</b> (tenant / VIF / VC identifier for peers whose VRF name is unknown; drawn next to that end), an <b>interface</b> (subIF like Gi0/0/1.100) and an <b>ip_address</b>. With an interface set the IP is written through to the device (created if missing); without one it stays on the endpoint. Link-level fields: <b>link_id</b> (shown on the canvas) and <b>vlan</b>.
    <h4>Mouse</h4>
    <b>Drag empty canvas</b> pan · <b>Wheel</b> zoom · <b>Shift+drag empty canvas</b> box-select<br>
    <b>Drag a node</b> move (moves the whole selection) · <b>Shift+click</b> add/remove from selection<br>
    <b>Drag from a ◦ port</b> create a link · <b>Double-click</b> rename · <b>Right-click</b> context menu
    <h4>Keyboard</h4>
    <b>Ctrl+K</b> command palette · <b>Ctrl+C / V / D</b> copy / paste / duplicate · <b>Ctrl+A</b> select all<br>
    <b>Delete</b> delete selection · <b>Ctrl+Z / Ctrl+Shift+Z</b> undo / redo · <b>Arrows</b> nudge (<b>Alt</b>=1px) · <b>Esc</b> deselect / close
    <h4>Toolbar</h4>
    <b>Snap</b> — dragged nodes snap to a 10px grid; blue guides appear when centers line up.<br>
    <b>Grid</b> — background grid lines (20px minor / 100px major).<br>
    <b>Fit</b> — zoom to show the whole topology.
    <h4>Objects & concepts</h4>
    <b>site</b> — nodes with the same site value are framed together; cross-site links default to circuit.<br>
    <b>Provider network</b> — carrier-side networks (amber, dashed). Links to it are always circuits; exported as <b>provider_networks[]</b>.<br>
    <b>VRF</b> — a routing instance on a device (devices carry a <b>vrfs</b> list). Logical links connect {device, vrf} to {device, vrf}; empty vrf = global.<br>
    <b>tenant</b> — owning organization (free text). <b>LAG</b> — member interfaces set <b>lag</b> to the parent name (Po1); parent type <b>lag</b>.<br>
    <b>Config Context</b> — free-form JSON/YAML settings per device (device panel or right-click → Config context…); exported as <b>config_context</b>, never drawn.<br>
    <b>Everything is optional</b> — empty fields are omitted from exports.
    <h4>AI round-trip</h4>
    <b>Export → For AI</b>: legend + current data, for describing THIS topology to an AI chat.<br>
    <b>Export → Schema</b>: the import-format spec — hand it to an AI agent to generate a draft, then Import and fine-tune here.
    <h4>Templates</h4>
    Save the current canvas from the sidebar; the three most recent are pinned, all are in <b>Ctrl+K</b>. Persists via localStorage when opened locally.`

const T = k => (STR[lang] && STR[lang][k] != null ? STR[lang][k] : (STR.en[k] != null ? STR.en[k] : k));
function applyLang(){
  const btnTxt = (sel, key)=>{
    const b = $(sel);
    if(!b) return;
    const tn = b.lastChild;
    if(tn && tn.nodeType===3) tn.nodeValue = T(key);
  };
  btnTxt('#btnUndo','tb_undo'); btnTxt('#btnRedo','tb_redo');
  btnTxt('#btnSnap','tb_snap'); btnTxt('#btnGrid','tb_grid'); btnTxt('#btnFit','tb_fit');
  btnTxt('#btnUnder','tb_under'); btnTxt('#btnGlobal','tb_global');
  btnTxt('#btnHelp','tb_help'); btnTxt('#btnImport','tb_import'); btnTxt('#btnExport','tb_export');
  const setTitle = (sel, key)=>{ const el2=$(sel); if(el2) el2.title = T(key); };
  setTitle('#btnSnap','tt_snap'); setTitle('#btnGrid','tt_grid'); setTitle('#btnFit','tt_fit');
  setTitle('#btnUnder','tt_under'); setTitle('#btnGlobal','tt_global');
  setTitle('#btnHelp','tt_help'); setTitle('#btnLang','tt_lang');
  const seg = document.querySelector('.tb-seg'); if(seg) seg.title = T('tt_seg');
  $('#btnPhys').textContent = T('tb_phys');
  $('#btnLogi').textContent = T('tb_logi');
  const bl = $('#btnLang'); if(bl) bl.textContent = T('lang_label');
  $('#palTitleNodes').textContent = T('pal_nodes');
  $('#palTitleTpl').textContent = T('pal_tpl');
  $('#palHint').innerHTML = T('pal_hint');
  $('#tplName').placeholder = T('tpl_ph');
  $('#tplSave').textContent = T('tpl_save');
  $('#btnClear').textContent = T('clear_canvas');
  $('#emptyHint').innerHTML = T('empty_hint');
  $('#stHint').textContent = T('st_hint');
  $('#modalCopy').textContent = T('m_copy');
  $('#modalFile').textContent = T('m_file');
  buildPalette();
}

  hist = hist.slice(0, hi+1);
  hist.push(snapshotStr());
  if(hist.length > 150) hist.shift();
  hi = hist.length-1;
  updateUndoBtns();
}
function restore(str){
  const o = JSON.parse(str);
  devices = o.devices; links = o.links;
  selDevs = new Set([...selDevs].filter(id=>devById(id)));
  if(selLink && !links.find(l=>l.id===selLink)) selLink = null;
  render(); renderPanel();
}
function undo(){ if(hi>0){ hi--; restore(hist[hi]); updateUndoBtns(); } }
function redo(){ if(hi<hist.length-1){ hi++; restore(hist[hi]); updateUndoBtns(); } }
function updateUndoBtns(){
  $('#btnUndo').disabled = hi<=0;
  $('#btnRedo').disabled = hi>=hist.length-1;
}

/* ---------- selection ---------- */
function selectOnly(id){ selDevs = new Set([id]); selLink = null; render(); renderPanel(); }
function toggleSel(id){ selLink = null; if(selDevs.has(id)) selDevs.delete(id); else selDevs.add(id); render(); renderPanel(); }
function selectLink(id){ selDevs.clear(); selLink = id; render(); renderPanel(); }
function selectNone(){ if(!selDevs.size && !selLink) return; selDevs.clear(); selLink = null; render(); renderPanel(); }
function selectAll(){ selDevs = new Set(devices.map(d=>d.id)); selLink = null; render(); renderPanel(); }

/* ---------- geometry ---------- */
function anchor(dev, tx, ty){
  const h = nodeH(dev);
  const cx = dev.x+NODE_W/2, cy = dev.y+h/2;
  const dx = tx-cx, dy = ty-cy;
  if(!dx && !dy) return {x:cx, y:cy};
  const sx = (NODE_W/2)/Math.max(Math.abs(dx),1e-9);
  const sy = (h/2)/Math.max(Math.abs(dy),1e-9);
  const s = Math.min(sx, sy);
  return {x:cx+dx*s, y:cy+dy*s};
}
/* compartment rect of a VRF row ('' = global) in logical view */
function vrfRowIdx(d, vrf){
  const v = (vrf||'').trim();
  const rows = vrfRows(d);
  if(!v) return showGlobal ? 0 : -1;
  const i = rows.indexOf(v);
  return i<0 ? (showGlobal ? 0 : -1) : i;
}
function vrfRowRect(d, vrf){
  const idx = vrfRowIdx(d, vrf);
  if(idx<0) return null;
  return {x:d.x+8, y:d.y+HEAD_H+idx*VRF_ROW+2, w:NODE_W-16, h:VRF_ROW-4};
}
/* anchor for a logical endpoint: one of the 4 sides of the compartment, chosen by the
   direction to the target. Falls back to the node body (null) when the row is hidden. */
function logAnchor(d, vrf, tx, ty){
  if(isPn(d) || viewMode!=='logical') return null;
  const r = vrfRowRect(d, vrf);
  if(!r) return null;
  const cx = r.x+r.w/2, cy = r.y+r.h/2;
  const dx = tx-cx, dy = (ty==null ? cy : ty)-cy;
  if(Math.abs(dy) > Math.abs(dx)) return {x:cx, y: dy>0 ? r.y+r.h : r.y};
  return {x: dx>0 ? r.x+r.w : r.x, y: cy};
}
function linkPath(l, i, n){
  const a = devById(l.a.dev), b = devById(l.b.dev);
  if(!a || !b) return null;
  const ac = {x:a.x+NODE_W/2, y:a.y+nodeH(a)/2}, bc = {x:b.x+NODE_W/2, y:b.y+nodeH(b)/2};
  let p1, p2;
  if(l.kind==='logical' && viewMode==='logical'){
    p1 = logAnchor(a, l.a.vrf, bc.x, bc.y) || anchor(a, bc.x, bc.y);
    p2 = logAnchor(b, l.b.vrf, ac.x, ac.y) || anchor(b, ac.x, ac.y);
  } else {
    p1 = anchor(a, bc.x, bc.y);
    p2 = anchor(b, ac.x, ac.y);
  }
  /* straight lines; parallel links are offset perpendicular to the segment */
  const off = (i-(n-1)/2)*16;
  const dx = p2.x-p1.x, dy = p2.y-p1.y, len = Math.hypot(dx,dy)||1;
  const nx = -dy/len*off, ny = dx/len*off;
  const q1 = {x:p1.x+nx, y:p1.y+ny}, q2 = {x:p2.x+nx, y:p2.y+ny};
  return {d:`M ${q1.x} ${q1.y} L ${q2.x} ${q2.y}`, lx:(q1.x+q2.x)/2, ly:(q1.y+q2.y)/2-6, p1:q1, p2:q2};
}

/* ---------- render ---------- */
let hoverNode = null, hoverVrfRow = null;
function logicalVrfOf(l){
  const a=(l.a.vrf||'').trim(), b=(l.b.vrf||'').trim();
  return a || b;
}
function linkLabelText(l){
  if(l.kind==='circuit') return [l.cid, l.provider, l.commit_rate].filter(Boolean).join(' · ') || 'circuit';
  if(l.kind==='logical'){
    /* VRF names are already visible on the compartments — show connection ID / free label only */
    return [l.link_id, l.label].filter(Boolean).join(' · ');
  }
  return [l.label, l.type, l.bandwidth].filter(Boolean).join(' · ');
}
function render(){
  lyGrid.style.display = gridOn ? '' : 'none';
  /* sites */
  lySites.innerHTML = '';
  const groups = {};
  devices.forEach(d=>{ const s = siteOf(d); if(s){ (groups[s]=groups[s]||[]).push(d); } });
  for(const s in groups){
    const ds = groups[s], PAD = 26;
    const x0 = Math.min(...ds.map(d=>d.x))-PAD, y0 = Math.min(...ds.map(d=>d.y))-PAD-12;
    const x1 = Math.max(...ds.map(d=>d.x+NODE_W))+PAD, y1 = Math.max(...ds.map(d=>d.y+nodeH(d)))+PAD;
    const g = el('g', {});
    g.appendChild(el('rect', {class:'site-rect', x:x0, y:y0, width:x1-x0, height:y1-y0, rx:12}));
    const lbl = el('text', {class:'site-label', x:x0+12, y:y0+18, 'data-site':s});
    lbl.textContent = '⌖ ' + s;
    g.appendChild(lbl);
    lySites.appendChild(g);
  }
  /* links */
  lyLinks.innerHTML = '';
  lyLogi.innerHTML = '';
  const pairIdx = {}, pairTotal = {};
  links.forEach(l=>{
    const key = [l.a.dev, l.b.dev].sort().join('|');
    pairTotal[key] = (pairTotal[key]||0)+1;
  });
  links.forEach(l=>{
    const key = [l.a.dev, l.b.dev].sort().join('|');
    const i = pairIdx[key] = (pairIdx[key]??-1)+1;
    if(viewMode==='physical' && l.kind==='logical') return;
    const physInLogical = viewMode==='logical' && l.kind!=='logical';
    if(physInLogical && !underlayOn) return;
    const p = linkPath(l, i, pairTotal[key]);
    if(!p) return;
    const selected = selLink===l.id;
    const g = el('g', {class:'link'+(selected?' selected':'')+(physInLogical?' dim':''), 'data-link':l.id});
    g.appendChild(el('path', {class:'link-hit', d:p.d}));
    const lineAttrs = {class:'link-line '+(l.kind==='circuit'?'circuit':l.kind==='logical'?'logical':''), d:p.d};
    if(l.kind==='logical' && !selected) lineAttrs.style = 'stroke:'+vrfColor(logicalVrfOf(l));
    g.appendChild(el('path', lineAttrs));
    const txt = linkLabelText(l);
    if(txt){
      const tAttrs = {class:'link-label', x:p.lx, y:p.ly, 'text-anchor':'middle'};
      if(l.kind==='logical' && !selected) tAttrs.style = 'fill:'+vrfColor(logicalVrfOf(l));
      const t = el('text', tAttrs);
      t.textContent = txt;
      g.appendChild(t);
    }
    /* logical links in the logical view: draw ABOVE nodes, mark endpoints, show endpoint IDs */
    if(l.kind==='logical' && viewMode==='logical'){
      [['a', p.p1, p.p2], ['b', p.p2, p.p1]].forEach(([side, pt, other])=>{
        g.appendChild(el('circle', {cx:pt.x, cy:pt.y, r:3.2,
          fill:vrfColor((l[side].vrf||'').trim()), 'pointer-events':'none'}));
        const idTxt = (l[side].id||'').trim();
        if(idTxt){
          const f = 0.16;
          const tx = pt.x + (other.x-pt.x)*f, ty = pt.y + (other.y-pt.y)*f - 7;
          const t2 = el('text', {class:'ep-id', x:tx, y:ty, 'text-anchor':'middle'});
          t2.textContent = idTxt;
          g.appendChild(t2);
        }
      });
      lyLogi.appendChild(g);
    } else {
      lyLinks.appendChild(g);
    }
  });
  /* nodes */
  lyNodes.innerHTML = '';
  devices.forEach(d=>{
    const sel = selDevs.has(d.id);
    const h = nodeH(d);
    const showPorts = (sel && selDevs.size===1) || d.id === hoverNode;
    const g = el('g', {class:'node'+(sel?' selected':''), 'data-node':d.id, transform:`translate(${d.x},${d.y})`});
    g.appendChild(el('rect', {class:'node-box'+(isPn(d)?' pnbox':''), width:NODE_W, height:h, rx:9}));
    const key = nodeIconKey(d);
    const ig = el('g', {transform:'translate(11,13)'});
    ig.innerHTML = `<g fill="none" stroke="${ROLE_COLOR[key]}" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" transform="scale(1.08)">${ICONS[key]}</g>`;
    g.appendChild(ig);
    const nm = el('text', {class:'node-name', x:44, y:22});
    nm.textContent = d.name || '(no name)';
    g.appendChild(nm);
    const sub = el('text', {class:'node-sub', x:44, y:37});
    sub.textContent = isPn(d)
      ? ('provider net' + (d.provider ? ' · '+d.provider : ''))
      : ([d.role, d.device_type].filter(Boolean).join(' · ') || '—');
    g.appendChild(sub);
    /* logical view: VRF compartments (global + each VRF) */
    if(viewMode==='logical' && !isPn(d)){
      const rows = vrfRows(d);
      rows.forEach((v, idx)=>{
        const ry = HEAD_H + idx*VRF_ROW + 2;
        const col = v ? vrfColor(v) : 'var(--line2)';
        const dropping = drag && drag.mode==='link' && drag.hoverRow === d.id+'|'+v;
        g.appendChild(el('rect', {class:'vrf-row'+(dropping?' drop':''), x:8, y:ry, width:NODE_W-16, height:VRF_ROW-4, rx:5,
                                  stroke:col, 'stroke-opacity': v?0.9:0.6,
                                  'data-vrfrow':d.id, 'data-vrfname':v}));
        const t = el('text', {class:'vrf-row-label', x:16, y:ry+14, fill: v?col:'var(--tx3)'});
        t.textContent = v || 'global';
        g.appendChild(t);
        if(showPorts || (drag && drag.mode==='link')){
          const rcy = ry+(VRF_ROW-4)/2;
          const pts = [[8, rcy],[NODE_W-8, rcy]];
          if(hoverVrfRow === d.id+'|'+v) pts.push([NODE_W/2, ry], [NODE_W/2, ry+VRF_ROW-4]);
          pts.forEach(([px,py])=>{
            g.appendChild(el('circle', {class:'port', cx:px, cy:py, r:4,
              'data-vrfport':d.id, 'data-vrfname':v}));
          });
        }
      });
    }
    /* node-edge ports: physical view for all; logical view for PN and for devices with no visible compartments */
    if(showPorts && (viewMode!=='logical' || isPn(d) || vrfRows(d).length===0)){
      [[NODE_W/2,0],[NODE_W,h/2],[NODE_W/2,h],[0,h/2]].forEach(([px,py])=>{
        g.appendChild(el('circle', {class:'port', cx:px, cy:py, r:4.5, 'data-port':d.id}));
      });
    }
    lyNodes.appendChild(g);
  });
  world.setAttribute('transform', `translate(${vt.x},${vt.y}) scale(${vt.k})`);
  $('#emptyHint').style.display = devices.length ? 'none' : 'block';
  /* vrf legend */
  const leg = $('#vrfLegend');
  const vrfs = allVrfs();
  if(viewMode==='logical' && vrfs.length){
    leg.style.display = 'flex';
    leg.innerHTML = '<div class="vt">VRF</div>' + vrfs.map(v=>
      `<div class="vrf-chip"><span class="vrf-dot" style="background:${vrfColor(v)}"></span>${esc(v)}</div>`).join('');
  } else leg.style.display = 'none';
  $('#viewBadge').style.display = viewMode==='logical' ? 'block' : 'none';
  /* status */
  const nDev = devices.filter(d=>!isPn(d)).length, nPn = devices.length-nDev;
  const nc = links.filter(l=>l.kind==='cable').length,
        ni = links.filter(l=>l.kind==='circuit').length,
        nl = links.filter(l=>l.kind==='logical').length;
  $('#stCounts').textContent =
    `${nDev} ${T('st_devices')}${nPn?` · ${nPn} ${T('st_pn')}`:''} · ${links.length} ${T('st_links')} (${nc} cable / ${ni} circuit / ${nl} logical) · ${sitesList().length} ${T('st_sites')}`
    + (selDevs.size>1 ? ` · ${selDevs.size} ${T('st_sel')}` : '');
  $('#stZoom').textContent = Math.round(vt.k*100)+'%';
}

/* =====================================================
   interactions
   ===================================================== */
let drag = null;
const elAt = (x, y)=>{ try{ return document.elementFromPoint(x, y); }catch(err){ return null; } };

svg.addEventListener('wheel', e=>{
  e.preventDefault();
  const w = toWorld(e.clientX, e.clientY);
  const k2 = Math.min(2.5, Math.max(0.25, vt.k * (e.deltaY<0 ? 1.12 : 1/1.12)));
  const r = svg.getBoundingClientRect();
  vt.x = e.clientX - r.left - w.x*k2;
  vt.y = e.clientY - r.top  - w.y*k2;
  vt.k = k2;
  render();
}, {passive:false});

svg.addEventListener('mousedown', e=>{
  hideCtx();
  const vport = e.target.closest('[data-vrfport]');
  const port = vport ? null : e.target.closest('[data-port]');
  const nodeG = (port||vport) ? null : e.target.closest('[data-node]');
  const linkG = e.target.closest('[data-link]');
  if(e.button===1 || (e.button===0 && !port && !vport && !nodeG && !linkG)){
    if(e.button===0 && e.shiftKey){
      drag = {mode:'marquee', start:toWorld(e.clientX, e.clientY)};
    } else {
      if(e.button===0) selectNone();
      drag = {mode:'pan', sx:e.clientX, sy:e.clientY, ox:vt.x, oy:vt.y};
      svg.classList.add('panning');
    }
    e.preventDefault();
    return;
  }
  if(e.button!==0) return;
  if(vport){
    drag = {mode:'link', from:vport.getAttribute('data-vrfport'), fromVrf:vport.getAttribute('data-vrfname')||''};
    svg.classList.add('linking');
    e.preventDefault();
    return;
  }
  if(port){
    drag = {mode:'link', from:port.getAttribute('data-port'), fromVrf:''};
    svg.classList.add('linking');
    e.preventDefault();
    return;
  }
  if(nodeG){
    const id = nodeG.getAttribute('data-node');
    if(e.shiftKey){
      toggleSel(id);
    } else {
      if(!selDevs.has(id)) selectOnly(id);
      const w = toWorld(e.clientX, e.clientY);
      const offs = {};
      selDevs.forEach(sid=>{ const dv = devById(sid); offs[sid] = {dx:w.x-dv.x, dy:w.y-dv.y}; });
      drag = {mode:'node', primary:id, offs, moved:false};
    }
    e.preventDefault();
    return;
  }
  if(linkG){
    selectLink(linkG.getAttribute('data-link'));
  }
});

window.addEventListener('mousemove', e=>{
  if(!drag){
    const t = e.target;
    const g = t && t.closest ? (t.closest('[data-node]') || t.closest('[data-port]') || t.closest('[data-vrfport]')) : null;
    const nid = g ? (g.getAttribute('data-node') || g.getAttribute('data-port') || g.getAttribute('data-vrfport')) : null;
    const rEl = t && t.closest ? (t.closest('[data-vrfrow]') || t.closest('[data-vrfport]')) : null;
    const rk = rEl ? (rEl.getAttribute('data-vrfrow')||rEl.getAttribute('data-vrfport'))+'|'+(rEl.getAttribute('data-vrfname')||'') : null;
    if(nid !== hoverNode || rk !== hoverVrfRow){ hoverNode = nid; hoverVrfRow = rk; render(); }
    return;
  }
  if(drag.mode==='pan'){
    vt.x = drag.ox + (e.clientX-drag.sx);
    vt.y = drag.oy + (e.clientY-drag.sy);
    render();
  } else if(drag.mode==='marquee'){
    const w = toWorld(e.clientX, e.clientY);
    drag.cur = w;
    lyGuides.innerHTML = '';
    lyGuides.appendChild(el('rect', {class:'marquee',
      x:Math.min(drag.start.x, w.x), y:Math.min(drag.start.y, w.y),
      width:Math.abs(w.x-drag.start.x), height:Math.abs(w.y-drag.start.y)}));
  } else if(drag.mode==='node'){
    const prim = devById(drag.primary);
    const w = toWorld(e.clientX, e.clientY);
    const off = drag.offs[drag.primary];
    let nx = snap(w.x-off.dx), ny = snap(w.y-off.dy);
    lyGuides.innerHTML = '';
    const th = 6/vt.k;
    let gx=null, gy=null;
    for(const o of devices){
      if(selDevs.has(o.id)) continue;
      const ocx=o.x+NODE_W/2, ocy=o.y+nodeH(o)/2;
      if(Math.abs((nx+NODE_W/2)-ocx)<=th){ nx = ocx-NODE_W/2; gx = ocx; }
      if(Math.abs((ny+nodeH(prim)/2)-ocy)<=th){ ny = ocy-nodeH(prim)/2; gy = ocy; }
    }
    if(gx!=null) lyGuides.appendChild(el('line',{class:'guide',x1:gx,y1:-1e5,x2:gx,y2:1e5}));
    if(gy!=null) lyGuides.appendChild(el('line',{class:'guide',x1:-1e5,y1:gy,x2:1e5,y2:gy}));
    const ddx = nx-prim.x, ddy = ny-prim.y;
    if(ddx || ddy){
      selDevs.forEach(sid=>{ const dv = devById(sid); dv.x += ddx; dv.y += ddy; });
      drag.moved = true;
      render();
    }
  } else if(drag.mode==='link'){
    const from = devById(drag.from);
    const w = toWorld(e.clientX, e.clientY);
    /* highlight the VRF compartment under the cursor as the drop target */
    const under = elAt(e.clientX, e.clientY);
    const rowEl = under && under.closest ? (under.closest('[data-vrfport]') || under.closest('[data-vrfrow]')) : null;
    const hk = rowEl
      ? (rowEl.getAttribute('data-vrfport')||rowEl.getAttribute('data-vrfrow'))+'|'+(rowEl.getAttribute('data-vrfname')||'')
      : null;
    if(hk !== drag.hoverRow){ drag.hoverRow = hk; render(); }
    const p = (viewMode==='logical' && !isPn(from) ? logAnchor(from, drag.fromVrf, w.x, w.y) : null) || anchor(from, w.x, w.y);
    lyTemp.innerHTML = '';
    lyTemp.appendChild(el('path', {class:'templink', d:`M ${p.x} ${p.y} L ${w.x} ${w.y}`}));
  }
});

window.addEventListener('mouseup', e=>{
  if(!drag) return;
  const d = drag; drag = null;
  svg.classList.remove('panning','linking');
  lyGuides.innerHTML = ''; lyTemp.innerHTML = '';
  if(d.mode==='node' && d.moved){ pushHistory(); }
  if(d.mode==='marquee' && d.cur){
    const x0=Math.min(d.start.x,d.cur.x), x1=Math.max(d.start.x,d.cur.x);
    const y0=Math.min(d.start.y,d.cur.y), y1=Math.max(d.start.y,d.cur.y);
    selLink = null;
    devices.forEach(dv=>{
      if(dv.x < x1 && dv.x+NODE_W > x0 && dv.y < y1 && dv.y+nodeH(dv) > y0) selDevs.add(dv.id);
    });
    render(); renderPanel();
  }
  if(d.mode==='link'){
    const t = elAt(e.clientX, e.clientY);
    const vpG = t && t.closest && (t.closest('[data-vrfport]') || t.closest('[data-vrfrow]'));
    const nG  = t && t.closest && (t.closest('[data-node]') || t.closest('[data-port]'));
    let toId = null, toVrf = '';
    if(vpG){
      toId = vpG.getAttribute('data-vrfport') || vpG.getAttribute('data-vrfrow');
      toVrf = vpG.getAttribute('data-vrfname')||'';
    }
    else if(nG){ toId = nG.getAttribute('data-node')||nG.getAttribute('data-port'); }
    if(toId && toId !== d.from){
      const a = devById(d.from), b = devById(toId);
      let kind;
      if(viewMode==='logical'){
        kind = 'logical';
      } else if(isPn(a) || isPn(b)){
        kind = 'circuit';
      } else {
        const sa = siteOf(a), sb = siteOf(b);
        kind = (sa && sb && sa!==sb) ? 'circuit' : 'cable';
      }
      const l = {id:uid('l'), kind,
                 a:{dev:a.id, ifname:'', vrf: kind==='logical' ? (d.fromVrf||'') : '', id:'', ip:''},
                 b:{dev:b.id, ifname:'', vrf: kind==='logical' ? toVrf : '', id:'', ip:''},
                 type:'', status:'', label:'', bandwidth:'', cid:'', provider:'', commit_rate:'',
                 link_id:'', vlan:'', description:''};
      links.push(l);
      selectLink(l.id);
      pushHistory();
      if(kind==='logical'){
        const va=(l.a.vrf||T('t_global_word')), vb=(l.b.vrf||T('t_global_word'));
        toast(T('t_log_link').replace('{a}', a.name).replace('{va}', va).replace('{b}', b.name).replace('{vb}', vb));
      } else {
        toast(kind==='circuit' ? T('t_circuit') : T('t_cable'));
      }
    }
    render();
  }
});

/* ---------- clipboard / duplicate / delete / clear ---------- */
function cloneEp(ep, idMap){
  return {dev: idMap ? idMap[ep.dev] : ep.dev, ifname: ep.ifname||'', vrf: ep.vrf||'', id: ep.id||'', ip: ep.ip||''};
}
function copySel(){
  if(!selDevs.size) return false;
  const devs = [...selDevs].map(devById).map(d=>JSON.parse(JSON.stringify(d)));
  const ls = links.filter(l=>selDevs.has(l.a.dev) && selDevs.has(l.b.dev)).map(l=>JSON.parse(JSON.stringify(l)));
  clipboard = {devs, ls};
  pasteN = 0;
  toast(T('t_copied').replace('{n}', devs.length).replace('{m}', ls.length));
  return true;
}
function pasteClip(at){
  if(!clipboard || !clipboard.devs.length) return;
  pasteN++;
  const minX = Math.min(...clipboard.devs.map(d=>d.x));
  const minY = Math.min(...clipboard.devs.map(d=>d.y));
  const bx = at ? at.x : minX + 32*pasteN;
  const by = at ? at.y : minY + 32*pasteN;
  const idMap = {};
  const newDevs = clipboard.devs.map(d=>{
    const c = JSON.parse(JSON.stringify(d));
    idMap[d.id] = c.id = uid('d');
    c.name = uniqueName(c.name || 'node');
    c.x = snap(bx + (d.x-minX)); c.y = snap(by + (d.y-minY));
    return c;
  });
  devices.push(...newDevs);
  clipboard.ls.forEach(l=>{
    const c = JSON.parse(JSON.stringify(l));
    c.id = uid('l');
    c.a = cloneEp(l.a, idMap);
    c.b = cloneEp(l.b, idMap);
    links.push(c);
  });
  selDevs = new Set(newDevs.map(d=>d.id)); selLink = null;
  pushHistory(); render(); renderPanel();
}
function duplicateSel(){
  if(!selDevs.size) return;
  const keep = clipboard, keepN = pasteN;
  clipboard = {
    devs: [...selDevs].map(devById).map(d=>JSON.parse(JSON.stringify(d))),
    ls: links.filter(l=>selDevs.has(l.a.dev) && selDevs.has(l.b.dev)).map(l=>JSON.parse(JSON.stringify(l)))
  };
  pasteN = 0;
  pasteClip();
  clipboard = keep; pasteN = keepN;
}
function deleteSelection(){
  if(selLink){
    links = links.filter(l=>l.id!==selLink);
    selLink = null;
  } else if(selDevs.size){
    devices = devices.filter(d=>!selDevs.has(d.id));
    links = links.filter(l=>!selDevs.has(l.a.dev) && !selDevs.has(l.b.dev));
    selDevs.clear();
  } else return;
  pushHistory(); render(); renderPanel();
}
function clearCanvas(){
  if(!devices.length && !links.length) return;
  devices = []; links = []; selDevs.clear(); selLink = null;
  pushHistory(); render(); renderPanel();
  toast(T('t_cleared'));
}

/* ---------- arrange ---------- */
const selArr = () => [...selDevs].map(devById);
function alignRow(){
  const ds = selArr(); if(ds.length<2) return;
  const y = snap(Math.round(ds.reduce((s,d)=>s+d.y,0)/ds.length));
  ds.forEach(d=>d.y=y);
  pushHistory(); render();
}
function alignCol(){
  const ds = selArr(); if(ds.length<2) return;
  const x = snap(Math.round(ds.reduce((s,d)=>s+d.x,0)/ds.length));
  ds.forEach(d=>d.x=x);
  pushHistory(); render();
}
function distH(){
  const ds = selArr().sort((a,b)=>a.x-b.x); if(ds.length<3) return;
  const step = (ds[ds.length-1].x - ds[0].x)/(ds.length-1);
  ds.forEach((d,i)=>d.x = snap(ds[0].x + step*i));
  pushHistory(); render();
}
function distV(){
  const ds = selArr().sort((a,b)=>a.y-b.y); if(ds.length<3) return;
  const step = (ds[ds.length-1].y - ds[0].y)/(ds.length-1);
  ds.forEach((d,i)=>d.y = snap(ds[0].y + step*i));
  pushHistory(); render();
}

/* ---------- auto layout (import fallback) / fit / zoom ---------- */
function autoLayout(){          /* used only when an import has no positions */
  if(!devices.length) return;
  const groups = new Map();
  devices.forEach(d=>{
    const s = siteOf(d) || '\u0000';
    if(!groups.has(s)) groups.set(s, []);
    groups.get(s).push(d);
  });
  const entries = [...groups.entries()].map(([s,ds])=>({s, ds}));
  const CELL_W = 210, CELL_H = 130, GAP = 100, PAD = 44;
  const perRow = Math.max(1, Math.ceil(Math.sqrt(entries.length)));
  let gx = 0, gy = 0, rowH = 0, col = 0;
  for(const en of entries){
    const ds = en.ds;
    const cols = Math.ceil(Math.sqrt(ds.length));
    ds.forEach((d,i)=>{
      d.x = gx + PAD + (i%cols)*CELL_W;
      d.y = gy + PAD + Math.floor(i/cols)*CELL_H;
    });
    const w = PAD*2 + cols*CELL_W;
    const h = PAD*2 + Math.ceil(ds.length/cols)*CELL_H;
    rowH = Math.max(rowH, h);
    col++;
    if(col>=perRow){ col=0; gx=0; gy+=rowH+GAP; rowH=0; }
    else gx += w + GAP;
  }
  pushHistory(); render(); fitView();
}
function fitView(){
  if(!devices.length) return;
  const x0 = Math.min(...devices.map(d=>d.x))-70, y0 = Math.min(...devices.map(d=>d.y))-70;
  const x1 = Math.max(...devices.map(d=>d.x+NODE_W))+70, y1 = Math.max(...devices.map(d=>d.y+nodeH(d)))+70;
  const r = svg.getBoundingClientRect();
  const k = Math.min(2, Math.max(0.25, Math.min(r.width/(x1-x0), r.height/(y1-y0))));
  vt.k = k;
  vt.x = (r.width - (x1-x0)*k)/2 - x0*k;
  vt.y = (r.height - (y1-y0)*k)/2 - y0*k;
  render();
}
function zoomCenter(f){
  const r = svg.getBoundingClientRect();
  const cx = r.width/2, cy = r.height/2;
  const w = {x:(cx-vt.x)/vt.k, y:(cy-vt.y)/vt.k};
  vt.k = Math.min(2.5, Math.max(0.25, vt.k*f));
  vt.x = cx - w.x*vt.k; vt.y = cy - w.y*vt.k;
  render();
}

    startInline({type:'node', id:dev.id}, dev.name, toScreen(dev.x, dev.y), NODE_W*vt.k, HEAD_H*vt.k);

    ie.value = s; ie.style.display='block'; ie.focus(); ie.select();

});
function startInline(ctxObj, val, pos, w, h){
  ieCtx = ctxObj;
  ie.style.left = pos.x+'px'; ie.style.top = pos.y+'px';
  ie.style.width = w+'px'; ie.style.height = h+'px';
  ie.value = val; ie.style.display='block'; ie.focus(); ie.select();
}
function commitInline(){
  if(!ieCtx) return;
  const v = ie.value.trim();
  if(ieCtx.type==='node'){
    const dev = devById(ieCtx.id);
    if(dev && v && v!==dev.name){ dev.name = v; pushHistory(); }
  } else if(ieCtx.type==='site'){
    if(v!==ieCtx.site){
      devices.forEach(d=>{ if(siteOf(d)===ieCtx.site) d.site = v; });
      pushHistory();
    }
  }
  ieCtx = null; ie.style.display='none';
  render(); renderPanel();
}
ie.addEventListener('keydown', e=>{
  if(e.key==='Enter') commitInline();
  if(e.key==='Escape'){ ieCtx=null; ie.style.display='none'; }

});

/* ---------- keyboard ---------- */
window.addEventListener('keydown', e=>{
  const tag = (document.activeElement||{}).tagName;
  const typing = tag==='INPUT' || tag==='TEXTAREA' || tag==='SELECT';
  const mod = e.ctrlKey || e.metaKey;
  if(mod && e.key.toLowerCase()==='k'){ e.preventDefault(); openCmd(); return; }
  if(typing) return;
  if(mod && !e.shiftKey && e.key.toLowerCase()==='z'){ e.preventDefault(); undo(); return; }
  if(mod && (e.key.toLowerCase()==='y' || (e.shiftKey && e.key.toLowerCase()==='z'))){ e.preventDefault(); redo(); return; }
  if(mod && e.key.toLowerCase()==='c'){ if(copySel()) e.preventDefault(); return; }
  if(mod && e.key.toLowerCase()==='v'){ e.preventDefault(); pasteClip(); return; }
  if(mod && e.key.toLowerCase()==='d'){ e.preventDefault(); duplicateSel(); return; }
  if(mod && e.key.toLowerCase()==='a'){ e.preventDefault(); selectAll(); return; }
  if(e.key==='Delete' || e.key==='Backspace'){ e.preventDefault(); deleteSelection(); return; }
  if(e.key==='Escape'){ selectNone(); closeCmd(); closeModal(); return; }
  if(selDevs.size && ['ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.key)){
    e.preventDefault();
    const step = e.altKey ? 1 : GRID;
    const dx = e.key==='ArrowLeft' ? -step : e.key==='ArrowRight' ? step : 0;
    const dy = e.key==='ArrowUp' ? -step : e.key==='ArrowDown' ? step : 0;
    selDevs.forEach(id=>{ const d = devById(id); d.x+=dx; d.y+=dy; });
    render();
    clearTimeout(window._nudgeTm);
    window._nudgeTm = setTimeout(pushHistory, 400);
  }
});

    });

    {cat:T('cat_edit'), label:T('c_undo'), fn:undo, kbd:'Ctrl+Z'},
    {cat:T('cat_edit'), label:T('c_redo'), fn:redo, kbd:'Ctrl+Shift+Z'},
    {cat:T('cat_edit'), label:T('c_arow'), fn:alignRow},
    {cat:T('cat_edit'), label:T('c_acol'), fn:alignCol},
    {cat:T('cat_edit'), label:T('c_dh'), fn:distH},
    {cat:T('cat_edit'), label:T('c_dv'), fn:distV},
    {cat:T('cat_edit'), label:T('c_clear'), fn:clearCanvas},
    {cat:T('cat_io'),   label:T('c_export'), fn:()=>openExport('json')},
    {cat:T('cat_io'),   label:T('c_schema'), fn:()=>openExport('schema')},
    {cat:T('cat_io'),   label:T('c_import'), fn:openImport},
    {cat:T('cat_help'), label:T('c_help'), fn:openHelp}
  );
  BUILTIN_TPLS.forEach(t=> cmds.push({cat:T('cat_tpl'), label:T('c_tpl')+t.name, fn:()=>loadTplData(t.data, t.name)}));
  userTpls().forEach(t=> cmds.push({cat:T('cat_tpl'), label:T('c_tpl')+t.name, fn:()=>loadTplData(t.data, t.name)}));
  cmds.push({cat:T('cat_tpl'), label:T('c_tpl_save'), fn:()=>{ $('#tplName').focus(); }});
  devices.forEach(d=> cmds.push({cat:T('cat_jump'), label:T('c_jump')+(d.name||'(no name)'), fn:()=>{
    selectOnly(d.id);
    const r2 = svg.getBoundingClientRect();
    vt.x = r2.width/2 - (d.x+NODE_W/2)*vt.k;
    vt.y = r2.height/2 - (d.y+nodeH(d)/2)*vt.k;
    render();
  }}));
  return cmds;
}
function buildCmd(q){
  const qq = q.toLowerCase();
  cmdItems = allCommands().filter(c=> c.label.toLowerCase().includes(qq));
  cmdSel = 0;
  renderCmd();
}
function renderCmd(){
  cmdList.innerHTML = '';
  cmdItems.slice(0,40).forEach((c,i)=>{
    const d = document.createElement('div');
    d.className = 'cmd-item'+(i===cmdSel?' sel':'');
    d.innerHTML = `<span class="cat">${esc(c.cat)}</span>${esc(c.label)}` + (c.kbd?`<span class="ck">${esc(c.kbd)}</span>`:'');
    d.onclick = ()=>{ closeCmd(); c.fn(); };
    d.onmouseenter = ()=>{ cmdSel=i; renderCmd(); };
    cmdList.appendChild(d);
  });
  if(!cmdItems.length) cmdList.innerHTML = '<div style="padding:14px;color:var(--tx3);font-size:12px">No matching commands</div>';
}
cmdInput.addEventListener('input', ()=> buildCmd(cmdInput.value));
cmdInput.addEventListener('keydown', e=>{
  if(e.key==='ArrowDown'){ e.preventDefault(); cmdSel=Math.min(cmdItems.length-1,cmdSel+1); renderCmd(); }
  if(e.key==='ArrowUp'){ e.preventDefault(); cmdSel=Math.max(0,cmdSel-1); renderCmd(); }
  if(e.key==='Enter' && cmdItems[cmdSel]){ const c=cmdItems[cmdSel]; closeCmd(); c.fn(); }
  if(e.key==='Escape') closeCmd();
  e.stopPropagation();
});

      </div>

    $('#alCol').onclick = alignCol;
    $('#alDh').onclick = distH;
    $('#alDv').onclick = distV;

    $('#pnDup').onclick = duplicateSel;
    $('#pnDel').onclick = deleteSelection;

      const v = $('#bulkSite').value.trim();
      selDevs.forEach(id=>{ const d = devById(id); if(!isPn(d)) d.site = v; });
      pushHistory(); render(); renderPanel();
    };
    return;
  }
  /* --- single node --- */
  if(!selLink && selDevs.size === 1){
    const d = devById([...selDevs][0]);
    if(!d){ selDevs.clear(); renderPanel(); return; }
    if(isPn(d)){
      panel.innerHTML = `
        ${datalists()}
        <div class="pn-title">${esc(T('pn_title2'))} <span class="badge">${esc(T('pn_badge'))}</span></div>
        ${fld('name', d.name, 'e.g. AWS Direct Connect')}
        ${fld('provider', d.provider, 'e.g. AWS / Oracle / Equinix')}
        ${fld('description', d.description, '')}
        <div class="pn-sep"></div>
        <div class="pn-info" style="font-size:11px">${T('pn_info')}</div>
        <div class="pn-actions">
          <button id="pnCopy">${esc(T('copy'))}</button>
          <button id="pnDup">${esc(T('dup'))}</button>
          <button id="pnDel" class="danger">${esc(T('del'))}</button>
        </div>`;
      bindPanelInputs(d);
      $('#pnCopy').onclick = copySel;
      $('#pnDup').onclick = duplicateSel;
      $('#pnDel').onclick = deleteSelection;
      return;
    }
    /* device */
    const explicit = new Set((d.vrfs||[]).map(v=>v.trim()).filter(Boolean));
    const vchips = devVrfs(d).map(v=>{
      const derived = !explicit.has(v);
      return `<span class="vchip${derived?' derived':''}" title="${esc(derived?T('vrf_chip_derived'):T('vrf_chip'))}">
        <span class="vd" style="background:${vrfColor(v)}"></span>${esc(v)}
        ${derived?'':`<button data-vdel="${esc(v)}" title="${esc(T('vrf_chip_del'))}">×</button>`}</span>`;
    }).join('');
    const ifs = d.interfaces.map((f,i)=>`
      <div class="if-card">
        <div class="if-row">
          <input data-if="${i}" data-k="name" value="${esc(f.name)}" placeholder="Gi0/0/1 or Gi0/0/1.100">

          <button class="if-del" data-ifdel="${i}" title="${esc(T('del'))}">×</button>
        </div>
        <div class="if-row3">
          <input data-if="${i}" data-k="type" value="${esc(f.type)}" placeholder="type / lag / virtual">

        <div class="if-row1">
          <input data-if="${i}" data-k="description" value="${esc(f.description)}" placeholder="description">

    panel.innerHTML = `
      ${datalists()}
      <div class="pn-title">${esc(T('dev_title'))} <span class="badge">${esc(iconKey(d.role))}</span></div>
      ${fld('name', d.name, 'hostname')}
      <div class="fld-row">
        ${fld('role', d.role, 'router / fw / …', 'dlRoles')}
        ${fld('site', d.site, 'site name', 'dlSites')}
      </div>
      <div class="fld-row">
        ${fld('tenant', d.tenant, 'owning org', 'dlTenants')}
        ${fld('platform', d.platform, 'OS')}
      </div>
      ${fld('device_type', d.device_type, 'vendor + model (e.g. Cisco C8300)')}
      <div class="pn-sep"></div>
      <div class="pn-title">${esc(T('vrf_title'))} <span class="badge">${devVrfs(d).length}</span></div>
      <div class="vchips">${vchips || `<span style="color:var(--tx3);font-size:11px">${esc(T('vrf_none'))}</span>`}</div>
      <div id="vrfAddRow">
        <input id="vrfNew" placeholder="${esc(T('vrf_ph'))}" list="dlVrfs" spellcheck="false">
        <button id="vrfAdd">${esc(T('vrf_add'))}</button>
      </div>
      <div style="color:var(--tx3);font-size:10px;line-height:1.6;margin-top:5px">${esc(T('vrf_hint'))}</div>
      <div class="pn-sep"></div>
      <div class="pn-title">${esc(T('if_title'))} <span class="badge">${d.interfaces.length}</span></div>
      ${ifs || `<div style="color:var(--tx3);font-size:11px;margin-bottom:6px">${esc(T('if_none'))}</div>`}

      <div class="pn-title">${esc(T('cc_title'))} <span class="badge">${d.config_context?Object.keys(d.config_context).length:'—'}</span></div>

        <button id="pnCopy">${esc(T('copy'))}</button>
        <button id="pnDup">${esc(T('dup'))}</button>

      if(!v) return;

    $('#vrfNew').addEventListener('keydown', e=>{ if(e.key==='Enter') addVrf(); e.stopPropagation(); });
    panel.querySelectorAll('[data-vdel]').forEach(b=>{
      b.onclick = ()=>{
        const v = b.getAttribute('data-vdel');
        d.vrfs = (d.vrfs||[]).filter(x=>x!==v);
        pushHistory(); render(); renderPanel();
      };
    });
    panel.querySelectorAll('input[data-if]').forEach(inp=>{
      const i = +inp.getAttribute('data-if'), k = inp.getAttribute('data-k');
      inp.addEventListener('input', ()=>{ d.interfaces[i][k] = inp.value; if(k==='vrf') render(); });
      inp.addEventListener('change', ()=>{ pushHistory(); });
    });
    panel.querySelectorAll('[data-ifdel]').forEach(b=>{
      b.onclick = ()=>{ d.interfaces.splice(+b.getAttribute('data-ifdel'),1); pushHistory(); render(); renderPanel(); };

    $('#ifAdd').onclick = ()=>{ d.interfaces.push({name:'',ip_address:'',type:'',description:'',lag:'',vrf:''}); pushHistory(); renderPanel(); };

    const ccp = $('#ccPreview');
    if(ccp) ccp.onclick = ()=> openConfigCtx(d.id);

    $('#pnDup').onclick = duplicateSel;
    $('#pnDel').onclick = deleteSelection;

  if(selLink){
    const l = links.find(x=>x.id===selLink);
    if(!l){ selLink=null; renderPanel(); return; }
    const A = devById(l.a.dev), B = devById(l.b.dev);
    /* ===== logical link: dedicated panel ===== */
    if(l.kind==='logical'){
      const epL = (side, dev) => {
        const borderCol = vrfColor((l[side].vrf||'').trim());
        if(isPn(dev)) return `<div class="ep-box" style="border-left:3px solid ${borderCol}">

        return `<div class="ep-box" style="border-left:3px solid ${borderCol}">
          <div class="ep-dev">${esc(dev.name)} <span class="ep-site">${esc(siteOf(dev)||'(no site)')}</span></div>
          ${vrfOpts}${ifOpts}
          <div class="ep-grid">
            <div>
              <div class="ep-lbl">${esc(T('ep_vrf'))}</div>
              <input data-epv="${side}" list="dlv_${dev.id}_${side}" value="${esc(l[side].vrf)}" placeholder="global">
            </div>
            <div>
              <div class="ep-lbl">${esc(T('ep_id'))}</div>
              <input data-epid="${side}" value="${esc(l[side].id)}" placeholder="optional">
            </div>
          </div>
          <div class="ep-grid" style="margin-top:4px">
            <div>
              <div class="ep-lbl">${esc(T('ep_if'))}</div>
              <input data-epi="${side}" list="dli_${dev.id}_${side}" value="${esc(ifn)}" placeholder="Gi0/0/1.100">
            </div>
            <div>
              <div class="ep-lbl">${esc(T('ep_ip'))}</div>
              <input data-epip="${side}" value="${esc(ip)}" placeholder="10.0.0.1/30">
            </div>
          </div>
        </div>`;
      };
      panel.innerHTML = `
        ${datalists()}
        <div class="pn-title">${esc(T('log_title'))} <span class="badge">${esc(T('log_badge'))}</span></div>
        ${epL('a', A)}
        <div style="text-align:center;color:var(--tx3);font-size:11px;margin:2px 0 8px">▲▼</div>
        ${epL('b', B)}
        <div class="pn-sep"></div>
        <div class="fld-row">
          ${fld('link_id', l.link_id, 'VC / VIF ID — shown on diagram')}
          ${fld('vlan', l.vlan, 'VLAN ID')}
        </div>
        ${fld('label', l.label, 'e.g. eBGP / OSPF area 0')}
        ${fld('description', l.description, '')}
        <div style="color:var(--tx3);font-size:10px;line-height:1.6;margin-top:2px">${esc(T('log_note'))}</div>
        <div class="pn-actions"><button id="pnDel" class="danger">${esc(T('del_link'))}</button></div>`;
      bindPanelInputs(l);
      panel.querySelectorAll('input[data-epv]').forEach(inp=>{
        const side = inp.getAttribute('data-epv');
        inp.addEventListener('input', ()=>{ l[side].vrf = inp.value; render(); });
        inp.addEventListener('change', ()=>{ pushHistory(); renderPanel(); });
      });
      panel.querySelectorAll('input[data-epid]').forEach(inp=>{
        const side = inp.getAttribute('data-epid');
        inp.addEventListener('input', ()=>{ l[side].id = inp.value; render(); });
        inp.addEventListener('change', ()=>{ pushHistory(); });
      });
      panel.querySelectorAll('input[data-epi]').forEach(inp=>{
        const side = inp.getAttribute('data-epi');
        inp.addEventListener('input', ()=>{ l[side].ifname = inp.value; });
        inp.addEventListener('change', ()=>{
          /* an endpoint-held IP migrates onto the newly named interface */
          const dev = devById(l[side].dev);
          const ifn = l[side].ifname;
          if(dev && !isPn(dev) && ifn && (l[side].ip||'').trim()){
            const f = ensureIf(dev, ifn);
            if(!f.ip_address) f.ip_address = l[side].ip;
            const v = (l[side].vrf||'').trim();
            if(v && !f.vrf) f.vrf = v;
            l[side].ip = '';
          }
          pushHistory(); renderPanel();
        });
      });
      panel.querySelectorAll('input[data-epip]').forEach(inp=>{
        const side = inp.getAttribute('data-epip');
        inp.addEventListener('input', ()=>{
          const dev = devById(l[side].dev);
          const ifn = l[side].ifname;
          if(dev && ifn){
            const f = ensureIf(dev, ifn);
            f.ip_address = inp.value;
            const v = (l[side].vrf||'').trim();
            if(v) f.vrf = v;
          } else {
            l[side].ip = inp.value;    /* no interface named — keep the IP on the endpoint itself */
          }
        });
        inp.addEventListener('change', ()=>{ pushHistory(); });
      });
      $('#pnDel').onclick = deleteSelection;
      return;
    }
    /* ===== physical link (cable / circuit) ===== */
    const hasPn = isPn(A) || isPn(B);
    const ifOpts = dev => `<datalist id="dl_${dev.id}">${(dev.interfaces||[]).map(f=>`<option value="${esc(f.name)}">`).join('')}</datalist>`;
    const ep = (side, dev) => isPn(dev)
      ? `<div class="ep-box"><div class="ep-dev">${esc(dev.name)} <span class="ep-site">${esc(T('pn_title2'))}${dev.provider?' · '+esc(dev.provider):''}</span></div></div>`
      : `<div class="ep-box">
          <div class="ep-dev">${esc(dev.name)} <span class="ep-site">${esc(siteOf(dev)||'(no site)')}</span></div>
          ${ifOpts(dev)}
          <input data-ep="${side}" list="dl_${dev.id}" value="${esc(l[side].ifname)}" placeholder="interface (e.g. Gi0/0/1)">
        </div>`;
    let common;
    if(l.kind==='cable'){
      common = fld('type', l.type, 'cat6 / smf / dac …') +
        `<div class="fld-row">${fld('bandwidth', l.bandwidth, 'e.g. 10Gbps / 2x10G LAG')}${fld('status', l.status, 'connected', 'dlStatus')}</div>` +
        fld('label', l.label, '');
    } else {
      common = fld('cid', l.cid, 'circuit ID') +
        fld('provider', l.provider, 'carrier (e.g. NTT Com)') +
        `<div class="fld-row">${fld('type', l.type, 'leased line / DX …')}${fld('commit_rate', l.commit_rate, 'bandwidth, e.g. 1Gbps')}</div>` +
        fld('status', l.status, 'active / provisioning', 'dlStatus');
    }
    panel.innerHTML = `
      ${datalists()}
      <div class="pn-title">${esc(T('phy_title'))} <span class="badge">${esc(l.kind==='cable'?T('badge_cable'):T('badge_circuit'))}</span></div>
      <div class="seg">
        <button id="segCable" class="${l.kind==='cable'?'on':''}" ${hasPn?`disabled title="${esc(T('seg_pn_dis'))}"`:''}>cable</button>
        <button id="segCircuit" class="${l.kind==='circuit'?'on':''}">circuit</button>
      </div>
      ${ep('a', A)}
      <div style="text-align:center;color:var(--tx3);font-size:11px;margin:2px 0 8px">▲▼</div>
      ${ep('b', B)}
      <div class="pn-sep"></div>
      ${common}
      <div class="pn-actions"><button id="pnDel" class="danger">${esc(T('del_link'))}</button></div>`;
    const setKind = k => { if(l.kind!==k){ l.kind=k; pushHistory(); render(); renderPanel(); } };
    $('#segCable').onclick = ()=>{ if(!hasPn) setKind('cable'); };
    $('#segCircuit').onclick = ()=> setKind('circuit');
    bindPanelInputs(l);
    panel.querySelectorAll('input[data-ep]').forEach(inp=>{
      inp.addEventListener('input', ()=>{ l[inp.getAttribute('data-ep')].ifname = inp.value; });
      inp.addEventListener('change', ()=>{ pushHistory(); });
    });
    $('#pnDel').onclick = deleteSelection;
    return;
  }
  /* --- nothing selected --- */
  panel.innerHTML = `
    <div class="pn-title">Network TopoDraft</div>
    <div class="pn-info">${T('home_html')}</div>`;
}

/* =====================================================
   export / import
   ===================================================== */
function clean(o){
  if(Array.isArray(o)){
    const a = o.map(clean).filter(v=>v!==undefined);
    return a.length ? a : undefined;
  }
  if(o && typeof o==='object'){
    const r = {};
    for(const k in o){
      const v = clean(o[k]);
      if(v!==undefined) r[k] = v;
    }
    return Object.keys(r).length ? r : undefined;
  }
  if(o==='' || o==null) return undefined;
  return o;
}
function epOut(dev, ep, withSite, withVrf){
  if(isPn(dev)){
    const o = {provider_network: dev.name};
    if(withVrf && (ep.id||'').trim()) o.id = ep.id.trim();
    return o;
  }
  const o = {};
  if(withSite && siteOf(dev)) o.site = siteOf(dev);
  o.device = dev.name;
  if(withVrf && (ep.vrf||'').trim()) o.vrf = ep.vrf.trim();
  if(withVrf && (ep.id||'').trim()) o.id = ep.id.trim();
  if(ep.ifname) o.interface = ep.ifname;
  if(withVrf && !ep.ifname && (ep.ip||'').trim()) o.ip_address = ep.ip.trim();
  return o;
}
function exportData(){
  const devs = devices.filter(d=>!isPn(d)).map(d=>{
    const o = clean({
      name:d.name, device_type:d.device_type, role:d.role, site:d.site, tenant:d.tenant, platform:d.platform,
      vrfs: (d.vrfs||[]).map(v=>v.trim()).filter(Boolean),
      interfaces: d.interfaces.map(f=>clean({name:f.name, ip_address:f.ip_address, type:f.type,
                                             description:f.description, lag:f.lag, vrf:f.vrf}))
    }) || {};
    if(d.config_context && Object.keys(d.config_context).length) o.config_context = d.config_context;
    o.position = {x:Math.round(d.x), y:Math.round(d.y)};
    if(!o.name) o.name = '';
    return o;
  });
  const pns = devices.filter(isPn).map(d=>{
    const o = clean({name:d.name, provider:d.provider, description:d.description}) || {};
    o.position = {x:Math.round(d.x), y:Math.round(d.y)};
    if(!o.name) o.name = '';
    return o;
  });
  const cables = [], circuits = [], logical = [];
  links.forEach(l=>{
    const A = devById(l.a.dev), B = devById(l.b.dev);
    if(!A||!B) return;
    if(l.kind==='circuit'){
      circuits.push(clean({
        cid:l.cid, provider:l.provider, type:l.type, commit_rate:l.commit_rate, status:l.status,
        a:epOut(A, l.a, true, false), b:epOut(B, l.b, true, false)
      }) || {});
    } else if(l.kind==='logical'){
      logical.push(clean({
        link_id:l.link_id, vlan:l.vlan, label:l.label, description:l.description,
        a:epOut(A, l.a, false, true), b:epOut(B, l.b, false, true)
      }) || {});
    } else {
      cables.push(clean({
        a:epOut(A, l.a, false, false), b:epOut(B, l.b, false, false),
        type:l.type, status:l.status, label:l.label, bandwidth:l.bandwidth
      }) || {});
    }
  });
  const out = {devices:devs};
  if(pns.length) out.provider_networks = pns;
  if(cables.length) out.cables = cables;
  if(circuits.length) out.circuits = circuits;
  if(logical.length) out.logical_links = logical;
  return out;
}
function importData(obj){
  if(!obj || !Array.isArray(obj.devices)) throw new Error('no "devices" array found');
  const nd = [], nl = [];
  const byName = {};
  obj.devices.forEach((d,i)=>{
    const dev = {
      id: uid('d'), kind:'device',
      name: d.name || ('node-'+(i+1)),
      device_type: d.device_type || '',
      role: d.role || '',
      site: d.site || '',
      tenant: d.tenant || '',
      platform: d.platform || '',
      vrfs: Array.isArray(d.vrfs) ? d.vrfs.map(v=>String(v).trim()).filter(Boolean) : [],
      interfaces: (d.interfaces||[]).map(f=>({name:f.name||'', ip_address:f.ip_address||'', type:f.type||'',
                                              description:f.description||'', lag:f.lag||'', vrf:f.vrf||''})),
      config_context: (d.config_context && typeof d.config_context==='object' && !Array.isArray(d.config_context)) ? d.config_context : null,
      x: d.position && Number.isFinite(d.position.x) ? d.position.x : NaN,
      y: d.position && Number.isFinite(d.position.y) ? d.position.y : NaN
    };
    nd.push(dev);
    if(!(dev.name in byName)) byName[dev.name] = dev;
  });
  (obj.provider_networks||[]).forEach((p,i)=>{
    const dev = {
      id: uid('d'), kind:'pn',
      name: p.name || ('pnet-'+(i+1)),
      provider: p.provider || '', description: p.description || '',
      device_type:'', role:'', site:'', tenant:'', platform:'', vrfs:[], interfaces:[], config_context:null,
      x: p.position && Number.isFinite(p.position.x) ? p.position.x : NaN,
      y: p.position && Number.isFinite(p.position.y) ? p.position.y : NaN
    };
    nd.push(dev);
    if(!(dev.name in byName)) byName[dev.name] = dev;
  });
  const epDev = ep => ep ? (ep.provider_network ? byName[ep.provider_network] : byName[ep.device]) : null;
  const mkEp = (dev, ep, fallbackVrf) => ({dev:dev.id, ifname:(ep && ep.interface)||'',
    vrf: ((ep && ep.vrf) || fallbackVrf || '').trim(),
    id: (ep && ep.id) || '',
    ip: (ep && !ep.interface && ep.ip_address) || ''});
  (obj.cables||[]).forEach(c=>{
    const A = epDev(c.a), B = epDev(c.b);
    if(!(A&&B)) return;
    nl.push({id:uid('l'), kind:'cable', a:mkEp(A,c.a,''), b:mkEp(B,c.b,''),
             type:c.type||'', status:c.status||'', label:c.label||'', bandwidth:c.bandwidth||'',
             cid:'', provider:'', commit_rate:'', link_id:'', vlan:'', description:''});
  });
  (obj.circuits||[]).forEach(c=>{
    const A = epDev(c.a), B = epDev(c.b);
    if(!(A&&B)) return;
    nl.push({id:uid('l'), kind:'circuit', a:mkEp(A,c.a,''), b:mkEp(B,c.b,''),
             type:c.type||'', status:c.status||'', label:'', bandwidth:'',
             cid:c.cid||'', provider:c.provider||'', commit_rate:c.commit_rate||'', link_id:'', vlan:'', description:''});
  });
  const epIfWrite = (dev, ep)=>{
    if(dev && !isPn(dev) && ep && ep.interface && ep.ip_address){
      const f = ensureIf(dev, ep.interface);
      if(!f.ip_address) f.ip_address = ep.ip_address;
      if(ep.vrf && !f.vrf) f.vrf = ep.vrf;
    }
  };
  (obj.logical_links||[]).forEach(c=>{
    const A = epDev(c.a), B = epDev(c.b);
    if(!(A&&B)) return;
    epIfWrite(A, c.a); epIfWrite(B, c.b);
    /* back-compat: v3 exports carried a single top-level "vrf" */
    nl.push({id:uid('l'), kind:'logical', a:mkEp(A,c.a,c.vrf), b:mkEp(B,c.b,c.vrf),
             type:'', status:'', label:c.label||'', bandwidth:'',
             cid:'', provider:'', commit_rate:'', link_id:c.link_id||'', vlan:c.vlan||'', description:c.description||''});
  });
  devices = nd; links = nl; selDevs.clear(); selLink = null;
  const noPos = devices.some(d=>!Number.isFinite(d.x));
  if(noPos){
    devices.forEach(d=>{ if(!Number.isFinite(d.x)){ d.x=0; d.y=0; } });
    autoLayout();
  } else {
    pushHistory(); render(); fitView();
  }
  renderPanel();
}

function mdTable(headers, rows){
  if(!rows.length) return '_none_\n';
  const h = '| '+headers.join(' | ')+' |';
  const s = '|'+headers.map(()=>' --- ').join('|')+'|';
  const b = rows.map(r=>'| '+r.map(c=>String(c??'').replace(/\|/g,'\\|')||'—').join(' | ')+' |').join('\n');
  return h+'\n'+s+'\n'+b+'\n';
}
const epStr = e => !e ? '' : (e.provider_network
  ? ['PN: '+e.provider_network, e.id?('id:'+e.id):''].filter(Boolean).join(' / ')
  : [e.site, e.device, e.vrf?('['+e.vrf+']'):'', e.id?('id:'+e.id):'', e.interface, e.ip_address].filter(Boolean).join(' / '));
function genMarkdown(){
